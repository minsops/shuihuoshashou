<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>水货杀手</title>
    <style>
      :root {
        color-scheme: light;
        --bg: oklch(0.965 0.012 178);
        --surface: oklch(0.992 0.006 178);
        --surface-2: oklch(0.948 0.014 178);
        --ink: oklch(0.215 0.032 238);
        --muted: oklch(0.485 0.028 236);
        --line: oklch(0.86 0.018 220);
        --teal: oklch(0.46 0.105 183);
        --teal-deep: oklch(0.34 0.09 184);
        --amber: oklch(0.72 0.145 74);
        --red: oklch(0.52 0.17 29);
        --green: oklch(0.5 0.13 148);
        --blue: oklch(0.48 0.12 248);
        --shadow: 0 18px 48px color-mix(in oklch, var(--ink), transparent 88%);
        --space-2xs: 4px;
        --space-xs: 8px;
        --space-sm: 12px;
        --space-md: 16px;
        --space-lg: 24px;
        --space-xl: 32px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, color-mix(in oklch, var(--teal), transparent 92%), transparent 280px),
          var(--bg);
        color: var(--ink);
        font-family:
          "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
        letter-spacing: 0;
      }

      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 38px;
        border: 1px solid var(--teal);
        border-radius: 6px;
        padding: 8px 12px;
        background: var(--teal);
        color: oklch(0.99 0.006 178);
        font-size: 14px;
        font-weight: 650;
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary,
      a.secondary {
        background: var(--surface);
        color: var(--teal-deep);
      }

      button.ghost {
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }

      button.danger {
        border-color: var(--red);
        background: var(--red);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.52;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-md);
        min-height: 72px;
        padding: 12px clamp(16px, 2.4vw, 32px);
        border-bottom: 1px solid var(--line);
        background: color-mix(in oklch, var(--surface), transparent 4%);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
        min-width: 0;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 8px;
        background: var(--ink);
        color: var(--surface);
        font-weight: 800;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
        line-height: 1.15;
      }

      .brand p,
      .muted {
        color: var(--muted);
      }

      .brand p {
        margin-top: 2px;
        font-size: 13px;
      }

      .top-actions,
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--space-xs);
      }

      .top-actions input {
        width: 160px;
        min-height: 38px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(320px, 0.8fr) minmax(420px, 1.15fr) minmax(320px, 0.9fr);
        gap: var(--space-md);
        padding: var(--space-md);
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--space-sm);
        padding: var(--space-md);
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        display: grid;
        gap: 3px;
      }

      .step {
        color: var(--teal-deep);
        font-size: 12px;
        font-weight: 800;
      }

      h2 {
        font-size: 17px;
        line-height: 1.2;
      }

      h3 {
        font-size: 14px;
        line-height: 1.25;
      }

      form,
      .panel-body,
      .stack {
        display: grid;
        gap: var(--space-sm);
      }

      form,
      .panel-body {
        padding: var(--space-md);
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 620;
      }

      input,
      textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        background: oklch(0.996 0.004 178);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.45;
        outline: none;
      }

      input:focus,
      textarea:focus {
        border-color: color-mix(in oklch, var(--teal), var(--line) 20%);
        box-shadow: 0 0 0 3px color-mix(in oklch, var(--teal), transparent 84%);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .compact-textarea {
        min-height: 84px;
      }

      input[type="file"] {
        padding: 8px;
        background: var(--surface-2);
      }

      .split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--space-sm);
      }

      .session-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--space-xs);
        padding: var(--space-md);
        border-bottom: 1px solid var(--line);
        background: color-mix(in oklch, var(--surface-2), transparent 35%);
      }

      .metric {
        display: grid;
        gap: 2px;
        min-height: 56px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface);
      }

      .metric span {
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 28px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 10px;
        background: var(--surface-2);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--muted);
      }

      .status-pill.ready .status-dot {
        background: var(--green);
      }

      .status-pill.live .status-dot {
        background: var(--amber);
      }

      .dimension-list,
      .probe-list,
      .feed {
        display: grid;
        gap: var(--space-xs);
      }

      .dimension-list {
        max-height: 280px;
        overflow: auto;
      }

      .dimension,
      .probe-card,
      .event,
      .report-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: color-mix(in oklch, var(--surface), var(--surface-2) 48%);
      }

      .dimension {
        display: grid;
        gap: var(--space-xs);
        padding: 11px;
      }

      .dimension-top,
      .event-top,
      .probe-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--space-xs);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid color-mix(in oklch, var(--teal), transparent 65%);
        border-radius: 999px;
        padding: 3px 8px;
        color: var(--teal-deep);
        font-size: 12px;
        font-weight: 750;
        white-space: nowrap;
      }

      .tag.amber {
        border-color: color-mix(in oklch, var(--amber), transparent 55%);
        color: oklch(0.42 0.095 68);
      }

      .tag.blue {
        border-color: color-mix(in oklch, var(--blue), transparent 58%);
        color: var(--blue);
      }

      .tag.red {
        border-color: color-mix(in oklch, var(--red), transparent 58%);
        color: var(--red);
      }

      .small {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .feed {
        max-height: 480px;
        min-height: 220px;
        overflow: auto;
        padding: var(--space-md);
      }

      .event {
        display: grid;
        gap: var(--space-xs);
        padding: 11px;
      }

      .event strong {
        font-size: 13px;
      }

      .event p,
      .probe-card p,
      .report-box p,
      .dimension p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .probe-card {
        display: grid;
        gap: var(--space-xs);
        padding: 12px;
      }

      .probe-card button {
        width: fit-content;
      }

      .question-field {
        min-height: 94px;
      }

      .answer-field {
        min-height: 128px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--space-xs);
      }

      .toolbar .status-pill {
        margin-left: auto;
      }

      .report-box {
        display: grid;
        gap: var(--space-sm);
        padding: var(--space-sm);
      }

      .score-line {
        display: grid;
        grid-template-columns: 112px 1fr;
        gap: var(--space-sm);
        align-items: stretch;
      }

      .score-main {
        display: grid;
        place-items: center;
        min-height: 112px;
        border-radius: 8px;
        background: var(--ink);
        color: var(--surface);
      }

      .score-main strong {
        font-size: 38px;
        line-height: 1;
      }

      .score-main span {
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 8px 6px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-weight: 760;
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 180px;
        border: 1px dashed color-mix(in oklch, var(--line), var(--muted) 18%);
        border-radius: 8px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      .risk {
        color: var(--red);
      }

      .success {
        color: var(--green);
      }

      @media (max-width: 1180px) {
        .workspace {
          grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.05fr);
        }

        .insight-panel {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 820px) {
        .topbar,
        .top-actions {
          align-items: flex-start;
        }

        .top-actions input {
          width: min(100%, 220px);
        }

        .topbar,
        .workspace,
        .split,
        .session-strip,
        .score-line {
          grid-template-columns: 1fr;
        }

        .topbar {
          display: grid;
        }

        .workspace {
          padding: var(--space-sm);
        }

        .toolbar .status-pill {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">杀</span>
        <div>
          <h1>水货杀手</h1>
          <p>实时深挖面试工作台</p>
        </div>
      </div>
      <div class="top-actions">
        <span class="status-pill" id="runtimeStatus"><span class="status-dot"></span><span>检查中</span></span>
        <span class="status-pill" id="modelStatus"><span class="status-dot"></span><span>模型检查中</span></span>
        <span class="status-pill" id="asrStatus"><span class="status-dot"></span><span>ASR 检查中</span></span>
        <button class="secondary" type="button" id="refreshStatus">刷新状态</button>
        <button class="secondary" type="button" id="checkModel">检查模型</button>
        <button class="secondary" type="button" id="checkAsr">检查 ASR</button>
        <input id="gatewayKey" type="password" autocomplete="off" placeholder="Gateway Key" />
        <button class="secondary" type="button" id="saveGatewayKey">保存 Key</button>
        <button class="secondary" type="button" id="loadSample">样例资料</button>
        <a class="button secondary" href="/docs" target="_blank">API 文档</a>
      </div>
    </header>

    <main class="workspace">
      <section class="panel setup-panel">
        <div class="panel-head">
          <div class="panel-title">
            <span class="step">01 资料</span>
            <h2>岗位 JD 与候选人简历</h2>
          </div>
          <span class="status-pill" id="setupStatus"><span class="status-dot"></span><span>未建面试</span></span>
        </div>
        <form id="setupForm">
          <div class="split">
            <label>
              岗位名称
              <input name="job_title" value="AI 后端工程师" required />
            </label>
            <label>
              候选人
              <input name="candidate_name" value="候选人A" required />
            </label>
          </div>
          <label>
            岗位 JD
            <textarea name="jd_text" id="jdText" required>负责 Python/FastAPI 微服务、LLM 应用、评估体系、可观测性与稳定性工程，需要能独立排查线上问题并推动复杂项目落地。</textarea>
          </label>
          <label>
            上传 JD 文档
            <input
              type="file"
              id="jdFile"
              accept=".txt,.md,.markdown,.json,.csv,.log,.pdf,.doc,.docx,.png,.jpg,.jpeg,.webp,.bmp,.tif,.tiff,.heic,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,image/*"
            />
          </label>
          <label>
            简历摘要
            <textarea name="resume_text" id="resumeText">候选人做过 AI 应用和后端服务，自述负责过 FastAPI 网关、模型调用编排、异常重试和评估报告链路。</textarea>
          </label>
          <label>
            上传简历文档
            <input
              type="file"
              id="resumeFile"
              accept=".txt,.md,.markdown,.json,.csv,.log,.pdf,.doc,.docx,.png,.jpg,.jpeg,.webp,.bmp,.tif,.tiff,.heic,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,image/*"
            />
          </label>
          <div class="toolbar">
            <button type="submit" id="prepareInterview">创建实时面试</button>
            <button class="secondary" type="button" id="resetSession">重置</button>
          </div>
          <div class="dimension-list" id="competencyList">
            <div class="empty">创建面试后显示岗位能力维度</div>
          </div>
        </form>
      </section>

      <section class="panel interview-panel">
        <div class="panel-head">
          <div class="panel-title">
            <span class="step">02 面试</span>
            <h2>实时语音与专业追问</h2>
          </div>
          <span class="status-pill" id="liveStatus"><span class="status-dot"></span><span>未连接</span></span>
        </div>
        <div class="session-strip">
          <div class="metric">
            <span>岗位</span>
            <strong id="metricJob">待创建</strong>
          </div>
          <div class="metric">
            <span>候选人</span>
            <strong id="metricCandidate">待创建</strong>
          </div>
          <div class="metric">
            <span>面试轮次</span>
            <strong id="metricTurns">0</strong>
          </div>
        </div>
        <form id="interviewForm">
          <label>
            当前面试问题
            <textarea class="question-field" name="current_question" id="currentQuestion" required>请介绍一个你最核心的 AI 后端项目，重点说明你本人负责的模块、关键技术取舍和上线后的指标变化。</textarea>
          </label>
          <label>
            候选人回答
            <textarea class="answer-field" name="answer" id="answerText" required>我主要负责优化项目架构，做了很多可靠性提升，最终效果比较明显。</textarea>
          </label>
          <div class="toolbar">
            <button type="submit" id="sendAnswer" disabled>发送回答</button>
            <button class="secondary" type="button" id="startMic" disabled>开始麦克风</button>
            <button class="secondary" type="button" id="stopMic" disabled>停止麦克风</button>
            <button class="secondary" type="button" id="reconnectSocket" disabled>重连通道</button>
            <button class="secondary" type="button" id="manualProbe" disabled>根据回答追问</button>
            <button class="danger" type="button" id="endInterview" disabled>结束并评分</button>
            <span class="status-pill" id="micStatus"><span class="status-dot"></span><span>麦克风未开启</span></span>
          </div>
          <p class="small" id="controlHint">请先创建实时面试并等待实时通道连接。</p>
        </form>
        <div class="feed" id="liveFeed">
          <div class="empty">实时转写、回答和追问事件会出现在这里</div>
        </div>
      </section>

      <aside class="panel insight-panel">
        <div class="panel-head">
          <div class="panel-title">
            <span class="step">03 决策</span>
            <h2>追问方向与评分报告</h2>
          </div>
        </div>
        <div class="panel-body">
          <div class="stack">
            <div class="dimension-top">
              <h3>问题候选方向</h3>
              <span class="tag blue" id="probeCount">0 条</span>
            </div>
            <div class="probe-list" id="probeList">
              <div class="empty">候选人回答后显示可点击的专业追问</div>
            </div>
          </div>
          <div class="stack">
            <div class="dimension-top">
              <h3>可信度信号</h3>
              <span class="tag amber" id="credibilityLevel">待观察</span>
            </div>
            <div class="report-box" id="credibilityBox">
              <p>等待候选人首个回答。</p>
            </div>
          </div>
          <div class="stack">
            <div class="dimension-top">
              <h3>最终评分</h3>
              <div class="row" id="reportLinks"></div>
            </div>
            <div id="reportPanel">
              <div class="empty">结束面试后生成综合评分</div>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <script>
      const setupForm = document.querySelector("#setupForm");
      const interviewForm = document.querySelector("#interviewForm");
      const jdText = document.querySelector("#jdText");
      const resumeText = document.querySelector("#resumeText");
      const currentQuestion = document.querySelector("#currentQuestion");
      const answerText = document.querySelector("#answerText");
      const setupStatus = document.querySelector("#setupStatus");
      const runtimeStatus = document.querySelector("#runtimeStatus");
      const modelStatus = document.querySelector("#modelStatus");
      const asrStatus = document.querySelector("#asrStatus");
      const refreshStatus = document.querySelector("#refreshStatus");
      const checkModel = document.querySelector("#checkModel");
      const checkAsr = document.querySelector("#checkAsr");
      const gatewayKey = document.querySelector("#gatewayKey");
      const saveGatewayKey = document.querySelector("#saveGatewayKey");
      const liveStatus = document.querySelector("#liveStatus");
      const micStatus = document.querySelector("#micStatus");
      const competencyList = document.querySelector("#competencyList");
      const probeList = document.querySelector("#probeList");
      const probeCount = document.querySelector("#probeCount");
      const credibilityLevel = document.querySelector("#credibilityLevel");
      const credibilityBox = document.querySelector("#credibilityBox");
      const reportPanel = document.querySelector("#reportPanel");
      const reportLinks = document.querySelector("#reportLinks");
      const liveFeed = document.querySelector("#liveFeed");
      const metricJob = document.querySelector("#metricJob");
      const metricCandidate = document.querySelector("#metricCandidate");
      const metricTurns = document.querySelector("#metricTurns");
      const prepareInterview = document.querySelector("#prepareInterview");
      const sendAnswer = document.querySelector("#sendAnswer");
      const startMic = document.querySelector("#startMic");
      const stopMic = document.querySelector("#stopMic");
      const reconnectSocket = document.querySelector("#reconnectSocket");
      const manualProbe = document.querySelector("#manualProbe");
      const endInterview = document.querySelector("#endInterview");
      const controlHint = document.querySelector("#controlHint");

      const state = {
        job: null,
        candidate: null,
        interview: null,
        socket: null,
        preparingInterview: false,
        seq: 1,
        turns: 0,
        selectedQuestionSource: "interviewer",
        selectedProbeTarget: null,
        selectedCompetency: null,
        interviewEnded: false,
        reportReady: false,
        startedAt: 0,
        micStream: null,
        micContext: null,
        micSource: null,
        micProcessor: null,
        micSamples: [],
        micSentSamples: 0,
        micSpeechStarted: false,
        micWaitingForVoiceNotice: false,
        micStarting: false,
        micStartToken: 0,
        micRecording: false,
        micError: "",
        apiOrigin:
          window.location.origin && window.location.origin !== "null"
            ? window.location.origin
            : "http://127.0.0.1:8001",
        gatewayApiKey: sessionStorage.getItem("gatewayApiKey") || "",
      };

      const micSampleRate = 16000;
      const micChunkSamples = micSampleRate;
      const micVoiceRmsThreshold = 0.012;
      const maxDocumentUploadBytes = 25 * 1024 * 1024;
      const supportedDocumentSuffixes = new Set([
        ".txt",
        ".md",
        ".markdown",
        ".json",
        ".csv",
        ".log",
        ".pdf",
        ".doc",
        ".docx",
        ".png",
        ".jpg",
        ".jpeg",
        ".webp",
        ".bmp",
        ".tif",
        ".tiff",
        ".heic",
      ]);
      const supportedDocumentMimeTypes = new Set([
        "application/pdf",
        "application/msword",
        "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
      ]);
      const fallbackGatewayOrigins = ["http://127.0.0.1:8001", "http://localhost:8001"];

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setPill(node, text, tone = "") {
        node.className = `status-pill ${tone}`;
        node.innerHTML = `<span class="status-dot"></span><span>${escapeHtml(text)}</span>`;
      }

      function setControls() {
        const socketState = state.socket ? state.socket.readyState : WebSocket.CLOSED;
        const connected = socketState === WebSocket.OPEN;
        const connecting = socketState === WebSocket.CONNECTING;
        const active = connected && !state.interviewEnded;
        sendAnswer.disabled = !active;
        startMic.disabled = !active || state.micRecording || state.micStarting;
        stopMic.disabled = !connected || !state.micRecording;
        reconnectSocket.disabled = !state.interview || connected || connecting || state.interviewEnded;
        manualProbe.disabled = !active;
        endInterview.disabled = !active;
        prepareInterview.disabled =
          state.preparingInterview || Boolean(state.interview) || connected || connecting;
        setControlHints(connected, connecting);
        controlHint.textContent = controlHintText(connected, connecting);
        if (state.reportReady) {
          setPill(liveStatus, "报告已生成", "ready");
        } else if (state.interviewEnded) {
          setPill(liveStatus, "面试已结束", "ready");
        } else if (connected) {
          setPill(liveStatus, `已连接 ${state.interview.id.slice(0, 8)}`, "live");
        } else if (connecting) {
          setPill(liveStatus, "连接中", "live");
        } else if (state.interview) {
          setPill(liveStatus, "通道未连接", "");
        } else {
          setPill(liveStatus, "未建面试", "");
        }
        if (state.micStarting) {
          setPill(micStatus, "麦克风启动中", "live");
        } else if (state.micRecording) {
          setPill(micStatus, "麦克风采集中", "live");
        } else if (connecting) {
          setPill(micStatus, "等待实时通道", "live");
        } else if (state.interviewEnded) {
          setPill(micStatus, "面试已结束", "ready");
        } else if (state.micError) {
          setPill(micStatus, state.micError, "");
        } else if (state.interview) {
          setPill(micStatus, "等待重连通道", "");
        } else if (!connected) {
          setPill(micStatus, "先创建实时面试", "");
        } else {
          setPill(micStatus, "麦克风未开启", "");
        }
      }

      function liveChannelUnavailableReason(connecting) {
        if (connecting) return "实时通道连接中";
        if (state.interview) return "实时通道未连接，请点击重连通道";
        return "请先创建实时面试并等待实时通道连接";
      }

      function setControlHints(connected, connecting) {
        const reason = liveChannelUnavailableReason(connecting);
        const endedReason = "面试已结束，请重置后创建新的面试";
        sendAnswer.title = state.interviewEnded
          ? endedReason
          : connected
            ? "发送文本回答并触发追问"
            : reason;
        startMic.title = state.interviewEnded
          ? endedReason
          : state.micStarting
            ? "正在请求麦克风权限并初始化音频采集"
          : connected
            ? "开始浏览器麦克风采集"
            : reason;
        stopMic.title = state.micRecording ? "停止麦克风采集" : "麦克风尚未开启";
        reconnectSocket.title = state.interviewEnded
          ? endedReason
          : state.interview
            ? "重新连接当前面试实时通道"
            : "请先创建实时面试";
        manualProbe.title = state.interviewEnded
          ? endedReason
          : connected
            ? "基于当前回答立即生成追问"
            : reason;
        endInterview.title = state.interviewEnded
          ? endedReason
          : connected
            ? "结束面试并生成评分报告"
            : reason;
        prepareInterview.title = state.preparingInterview
          ? "正在创建实时面试"
          : state.interview
            ? "当前已有面试，请重置后再创建新的面试"

      function controlHintText(connected, connecting) {
        if (state.reportReady) return "报告已生成。可以下载 HTML、PDF、JSON 或转写，或重置后开始新的面试。";
        if (state.interviewEnded) return "面试已结束。请重置后创建新的面试。";
        if (state.micStarting) return "麦克风启动中。请在浏览器权限弹窗中允许麦克风，并等待初始化完成。";
        if (state.micRecording) return "麦克风采集中。可以停止麦克风，或结束面试生成评分报告。";
        if (state.micError) return `${state.micError} 可以修复后再次点击开始麦克风。`;
        if (connected) return "实时通道已连接。可以发送文字回答，或点击开始麦克风进行语音转写。";
        if (connecting) return "实时通道连接中，请稍候。连接成功后按钮会自动启用。";
        if (state.interview) return "实时通道未连接。请点击重连通道，或重置后重新创建面试。";
        return "请先创建实时面试并等待实时通道连接。";
      }

      function appendEvent(title, body, tone = "") {
        if (liveFeed.querySelector(".empty")) liveFeed.innerHTML = "";
        const node = document.createElement("div");
        node.className = "event";
        const tag = tone ? `<span class="tag ${tone}">${escapeHtml(tone)}</span>` : "";
        node.innerHTML = `
          <div class="event-top"><strong>${escapeHtml(title)}</strong>${tag}</div>
          <p>${body}</p>
        `;
        liveFeed.prepend(node);
      }

      async function readErrorMessage(response) {
        const fallback = `HTTP ${response.status}`;
        const text = await response.text();
        if (!text.trim()) return fallback;
        try {
          const payload = JSON.parse(text);
          const detail = payload.detail;
          if (Array.isArray(detail)) {
            return detail
              .map((item) => {
                const path = Array.isArray(item.loc) ? item.loc.join(".") : "";
                return [path, item.msg].filter(Boolean).join(": ");
              })
              .filter(Boolean)
              .join("；") || fallback;
          }
          if (typeof detail === "string" && detail.trim()) return detail;
          if (detail && typeof detail === "object") return JSON.stringify(detail);
          if (typeof payload.message === "string" && payload.message.trim()) {
            return payload.message;
          }
        } catch (error) {
          return text;
        }
        return text;
      }

      function errorText(error) {
        return error && error.message ? error.message : String(error);
      }

      function attemptedGatewayOriginsText() {
        return gatewayOrigins().join("、");
      }

      function gatewayHelpText() {
        return `请确认已运行 python scripts/run_gateway.py；页面正在尝试连接：${attemptedGatewayOriginsText()}。`;
      }

      function gatewayOrigins() {
        return [state.apiOrigin, ...fallbackGatewayOrigins].filter(
          (origin, index, origins) => origin && origins.indexOf(origin) === index
        );
      }

      function apiUrl(path) {
        const normalizedPath = path.startsWith("/") ? path : `/${path}`;
        return `${state.apiOrigin}${normalizedPath}`;
      }

      function gatewayOriginFromResponse(response, fallbackOrigin) {
        try {
          return new URL(response.url).origin;
        } catch (error) {
          return fallbackOrigin;
        }
      }

      function authQueryParams() {
        return state.gatewayApiKey ? { api_key: state.gatewayApiKey } : {};
      }

      function gatewayUrl(path) {
        const url = new URL(apiUrl(path));
        Object.entries(authQueryParams()).forEach(([key, value]) => {
          url.searchParams.set(key, value);
        });
        return url.toString();
      }

      function gatewayHeaders(headers = {}) {
        return state.gatewayApiKey ? { ...headers, "X-API-Key": state.gatewayApiKey } : headers;
      }

      function wsUrl(path) {
        const url = new URL(apiUrl(path));
        url.protocol = url.protocol === "https:" ? "wss:" : "ws:";
        return url.toString();
      }

      function websocketProtocols() {
        if (!state.gatewayApiKey) return undefined;
        return [`gateway-key.${base64UrlEncode(state.gatewayApiKey)}`];
      }

      function base64UrlEncode(value) {
        const bytes = new TextEncoder().encode(value);
        let binary = "";
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
      }

      async function fetchWithTimeout(url, options = {}, timeoutMs = 3500) {
        const controller = new AbortController();
        const timer = window.setTimeout(() => controller.abort(), timeoutMs);
        try {
          return await fetch(url, {
            ...options,
            signal: controller.signal,
          });
        } finally {
          window.clearTimeout(timer);
        }
      }

      async function discoverGateway() {
        const failures = [];
        for (const origin of gatewayOrigins()) {
          try {
            const response = await fetchWithTimeout(`${origin}/health`, { cache: "no-store" });
            if (!response.ok) {
              failures.push(`${origin}: HTTP ${response.status}`);
              continue;
            }
            const status = await response.json();
            if (status.service !== "shuihuo-killer-gateway") {
              failures.push(`${origin}: 不是水货杀手 gateway`);
              continue;
            }
            const previousOrigin = state.apiOrigin;
            const resolvedOrigin = gatewayOriginFromResponse(response, origin);
            state.apiOrigin = resolvedOrigin;
            if (previousOrigin !== resolvedOrigin) {
              appendEvent(
                "服务检查",
                `已自动切换到本地 gateway：${escapeHtml(resolvedOrigin)}`,
                "green"
              );
            }
            return status;
          } catch (error) {
            failures.push(`${origin}: ${errorText(error)}`);
          }
        }
        throw new Error(failures.join("；") || "gateway unreachable");
      }

      async function fetchGateway(path, options = {}) {
        const response = await fetchWithTimeout(apiUrl(path), {
          ...options,
          headers: gatewayHeaders(options.headers || {}),
        });
        if (!response.ok) throw new Error(await readErrorMessage(response));
        return response;
      }

      async function fetchGatewayJson(path, options = {}) {
        const response = await fetchGateway(path, options);
        return response.json();
      }

      async function postJson(url, payload) {
        const response = await fetchGateway(url, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        return response.json();
      }

      function saveGatewayApiKey() {
        state.gatewayApiKey = gatewayKey.value.trim();
        if (state.gatewayApiKey) {
          sessionStorage.setItem("gatewayApiKey", state.gatewayApiKey);
          appendEvent("Gateway Key", "已保存到当前浏览器会话。", "green");
        } else {
          sessionStorage.removeItem("gatewayApiKey");
          appendEvent("Gateway Key", "已清除当前浏览器会话中的 key。");
        }
        checkRuntime();
      }

      async function checkRuntime() {
        refreshStatus.disabled = true;
        refreshStatus.title = "正在刷新服务、模型和 ASR 状态";
        setPill(runtimeStatus, "检查中", "live");
        setPill(modelStatus, "模型检查中", "live");
        setPill(asrStatus, "ASR 检查中", "live");
        try {
          const status = await discoverGateway();
          setPill(
            runtimeStatus,
            status.status === "ok" ? "服务正常" : "服务异常",
            status.status === "ok" ? "ready" : ""
          );
          runtimeStatus.title = `当前 gateway：${state.apiOrigin}`;
        } catch (error) {
          setPill(runtimeStatus, "服务不可达", "");
          runtimeStatus.title = `服务不可达：${errorText(error)}`;
          appendEvent(
            "服务检查",
            `无法连接到本地 gateway。${escapeHtml(gatewayHelpText())}<br><span class="small">失败详情：${escapeHtml(errorText(error))}</span>`,
            "red"
          );
        }
        try {
          const config = await fetchGatewayJson("/api/config/status");
          const model = modelStatusFromConfig(config);
          setPill(modelStatus, model.text, model.ready ? "ready" : "");
          modelStatus.title = model.title || model.text;
          const asr = asrStatusFromConfig(config);
          setPill(asrStatus, asr.text, asr.ready ? "ready" : "");
          asrStatus.title = asr.title || asr.text;
        } catch (error) {
          if (gatewayAuthError(error)) {
            showGatewayKeyRequired("服务检查", { model: true, asr: true });
          } else {
            const message = `配置状态读取失败：${errorText(error)}`;
            setPill(modelStatus, "模型状态未知", "");
            setStatusTitleFromMessage(modelStatus, message);
            setPill(asrStatus, "ASR 状态未知", "");
            setStatusTitleFromMessage(asrStatus, message);
          }
        } finally {
          refreshStatus.disabled = false;
          refreshStatus.title = "重新检查服务、模型和 ASR 状态";
        }
      }

      function gatewayAuthError(error) {
        const text = errorText(error).toLowerCase();
        return text.includes("401") || text.includes("unauthorized");
      }

      function showGatewayKeyRequired(title, targets = {}) {
        const message = "Gateway 已启用鉴权，请在顶部 Gateway Key 输入框保存 key。";
        if (targets.model) {
          setPill(modelStatus, "需要 Gateway Key", "");
          setStatusTitleFromMessage(modelStatus, message);
        }
        if (targets.asr) {
          setPill(asrStatus, "需要 Gateway Key", "");
          setStatusTitleFromMessage(asrStatus, message);
        }
        appendEvent(title, message, "red");
      }

      function setStatusTitleFromMessage(node, message) {
        node.title = String(message || "").trim() || node.textContent.trim();
      }

      async function checkLlmConnection() {
        checkModel.disabled = true;
        checkModel.title = "正在调用真实模型检查连接";
        setPill(modelStatus, "模型连接检查中", "live");

          await discoverGateway();
          const result = await fetchGatewayJson("/api/config/llm/check", { method: "POST" });
          setPill(modelStatus, result.ok ? "模型连接正常" : "模型连接异常", result.ok ? "ready" : "");
          setStatusTitleFromMessage(modelStatus, result.message);

        } catch (error) {

      async function checkAsrReadiness() {
        checkAsr.disabled = true;
        checkAsr.title = "正在检查 ASR 配置、依赖和 Token";
        setPill(asrStatus, "ASR 检查中", "live");
        try {
          await discoverGateway();
          const result = await fetchGatewayJson("/api/config/asr/check", { method: "POST" });
          setPill(asrStatus, asrCheckStatusText(result), result.ok ? "ready" : "");
          setStatusTitleFromMessage(asrStatus, result.message);
          appendEvent("ASR 检查", escapeHtml(result.message), result.ok ? "green" : "red");
        } catch (error) {
          if (gatewayAuthError(error)) {
            showGatewayKeyRequired("ASR 检查", { asr: true });
          } else {
            const message = errorText(error);
            setPill(asrStatus, "ASR 异常", "");
            setStatusTitleFromMessage(asrStatus, message);
            appendEvent("ASR 检查", escapeHtml(message), "red");
          }
        } finally {
          checkAsr.disabled = false;
          checkAsr.title = "手动检查 ASR 配置、依赖和 Token";

      function asrCheckStatusText(result) {
        if (!result.ok) return "ASR 异常";
        if (result.mode === "token_ready") return "ASR Token 可生成，未跑音频";
        if (result.mode === "fixed_token") return "ASR 固定 Token 已配置，未验有效期";
        if (result.mode === "configured") return "ASR 配置存在，未跑音频";
        return "ASR 检查通过";
      }

      function modelStatusFromConfig(config) {
        if (config.llm_provider === "mock") {
          return { text: "模型模拟模式", ready: false };
        }
        if (config.llm_provider === "openai_compatible") {
          const ready = config.llm_base_url_configured && config.llm_api_key_configured;
          const modelName = config.llm_model || "未知模型";
          return {
            text: ready ? `模型 ${modelName} 已配置，未检查连接` : "模型未配置完整",
            ready: false,
            title: ready
              ? "配置项已填写；点击“检查模型”后才会调用真实模型确认连接。"
              : "请检查 LLM_BASE_URL 和 LLM_API_KEY。",
          };
        }
        return { text: "模型状态未知", ready: false };
      }

      function asrStatusFromConfig(config) {
        if (config.asr_provider === "aliyun_nls_ws") {
          const tokenReady =
            config.aliyun_nls_token_configured || config.aliyun_nls_token_auto_configured;
          const ready =
            config.aliyun_nls_app_key_configured &&
            tokenReady &&
            config.aliyun_nls_endpoint_configured;
          return {
            text: ready
              ? tokenReady && !config.aliyun_nls_token_configured
                ? "ASR 阿里云 NLS 已配置（自动 Token），未检查"
                : "ASR 阿里云 NLS 已配置，未检查"
              : "ASR 阿里云 NLS 未配置完整",
            ready: false,
            title: ready
              ? "配置项已填写；点击“检查 ASR”后才会验证依赖和 Token。"
              : "请检查阿里云 NLS AppKey、Endpoint 和 Token/AK 配置。",
          };
        }
        if (config.asr_provider === "aliyun_ws") {
          const ready =
            config.aliyun_asr_api_key_configured && config.aliyun_asr_endpoint_configured;
          return {
            text: ready
              ? "ASR 阿里云 DashScope 已配置，未检查"
              : "ASR 阿里云 DashScope 未配置完整",
            ready: false,
            title: ready
              ? "配置项已填写；点击“检查 ASR”后才会验证依赖。"
              : "请检查阿里云 DashScope API Key 和 Endpoint。",
          };
        }
        if (config.asr_provider === "http") {
          const ready = config.asr_base_url_configured;
          return {
            text: ready ? "ASR HTTP 已配置，未检查" : "ASR HTTP 未配置完整",
            ready: false,
            title: ready
              ? "配置项已填写；点击“检查 ASR”后才会确认基本配置。"
              : "请检查 ASR_BASE_URL。",
          };
        }
        if (config.asr_provider === "stub") {
          return { text: "ASR 模拟模式", ready: false };
        }
        return { text: "ASR 状态未知", ready: false };
      }

      async function parseDocumentFile(file, input, target, label, kind) {
        if (!file) return;
        if (!supportedDocumentFile(file)) {
          setUploadInputStatus(input, `${label} 文件格式暂不支持：${file.name}`);
          appendEvent(
            "资料上传失败",
            `${escapeHtml(label)} 文件格式暂不支持，请上传 txt、md、json、csv、log、pdf、docx、doc 或图片。`,
            "red"
          );
          input.value = "";
          return;
        }
        if (file.size > maxDocumentUploadBytes) {
          setUploadInputStatus(input, `${label} 文件超过 25MB：${file.name}`);
          appendEvent(
            "资料上传失败",
            `${escapeHtml(label)} 文件超过 25MB，请压缩、拆分或直接粘贴关键内容。`,
            "red"
          );
          input.value = "";
          return;
        }
        appendEvent("资料上传", `${escapeHtml(label)} 正在解析：${escapeHtml(file.name)}`);
        setUploadInputStatus(input, `${label} 正在解析：${file.name}`);
        input.disabled = true;
        try {
          const params = new URLSearchParams({ kind, filename: file.name });
          const response = await fetchGateway(`/api/documents/parse?${params.toString()}`, {
            method: "POST",
            headers: { "content-type": file.type || "application/octet-stream" },
            body: await file.arrayBuffer(),
          });
          const result = await response.json();
          const parsedText = String(result.text || "").trim();
          if (!parsedText) {
            setUploadInputStatus(input, `${label} 未提取到可用文本：${file.name}`);
            appendEvent(
              "资料上传失败",
              `${escapeHtml(label)} 未提取到可用文本，请换成文字版 PDF、DOCX 或直接粘贴内容。`,
              "red"
            );
            return;
          }
          target.value = result.text;
          let modelNote = "";
          if (result.llm_attempted) {
            if (result.used_llm) {
              modelNote = "，已调用 DeepSeek 清洗正文";
            } else if (String(result.warning || "").includes("DeepSeek")) {
              modelNote = "，DeepSeek 清洗未完成";
            } else {
              modelNote = "，已调用 DeepSeek 校验正文";
            }
          }
          appendEvent(
            "资料上传",
            `${escapeHtml(label)} 已解析：${escapeHtml(file.name)}（${escapeHtml(result.source)}${modelNote}）`
          );
          setUploadInputStatus(input, `${label} 已解析：${file.name}`);
          if (result.warning) {
            appendEvent("资料上传提示", escapeHtml(result.warning), "red");
          }
        } catch (error) {
          const message = errorText(error);
          setUploadInputStatus(input, `${label} 解析失败：${message}`);
          appendEvent("资料上传失败", escapeHtml(message), "red");
        } finally {
          input.disabled = false;
          input.value = "";
        }
      }

      function setUploadInputStatus(input, message) {
        input.title = String(message || "").trim();
      }

      function fileSuffix(filename) {
        const dotIndex = filename.lastIndexOf(".");
        return dotIndex >= 0 ? filename.slice(dotIndex).toLowerCase() : "";
      }

      function supportedDocumentFile(file) {
        const type = normalizedContentType(file.type);
        return (
          supportedDocumentSuffixes.has(fileSuffix(file.name)) ||
          supportedDocumentMimeTypes.has(type) ||
          type.startsWith("text/") ||
          type.startsWith("image/")
        );
      }

      function normalizedContentType(contentType) {
        return String(contentType || "").split(";", 1)[0].trim().toLowerCase();
      }

      function renderCompetencies(job) {
        const items = job.competency_model.items || [];
        if (!items.length) {
          competencyList.innerHTML = '<div class="empty">暂无能力维度</div>';
          return;
        }
        competencyList.innerHTML = items
          .map(
            (item, index) => `
              <div class="dimension">
                <div class="dimension-top">
                  <h3>${escapeHtml(item.name)}</h3>
                  <span class="tag">${Math.round(Number(item.weight || 0) * 100)}%</span>
                </div>
                <p>${escapeHtml(item.description)}</p>
                <button class="secondary" type="button" data-seed-question="${index}">生成此维度问题</button>
              </div>
            `
          )
          .join("");
        competencyList.querySelectorAll("[data-seed-question]").forEach((button) => {
          button.addEventListener("click", () => {
            const item = items[Number(button.dataset.seedQuestion)];
            const question = seedQuestionFor(item);
            selectQuestion(question, {
              questionSource: "interviewer",
              probeTarget: item.name,
              competency: item.name,
            });
          });
        });
        renderProbeCards(
          items.slice(0, 3).map((item, index) => ({
            priority: index + 1,
            question: seedQuestionFor(item),
            target: "建立候选方向",
            competency: item.name,
          }))
        );
      }

      function seedQuestionFor(item) {
        const pattern = item.probe_patterns && item.probe_patterns[0];
        return (
          pattern ||
          `围绕「${item.name}」，请候选人讲一个真实项目细节：本人负责哪一段、为什么这样设计、遇到什么异常、最后指标如何变化？`
        );
      }

      function renderProbeCards(suggestions = []) {
        probeCount.textContent = `${suggestions.length} 条`;
        if (!suggestions.length) {
          probeList.innerHTML = '<div class="empty">候选人回答后显示可点击的专业追问</div>';
          return;
        }
        probeList.innerHTML = suggestions
          .map(
            (item, index) => `
              <div class="probe-card">
                <div class="probe-top">
                  <span class="tag amber">P${escapeHtml(item.priority || index + 1)}</span>
                  <span class="tag blue">${escapeHtml(item.competency)}</span>
                </div>
                <h3>${escapeHtml(item.question)}</h3>
                <p>${escapeHtml(item.target)}</p>
                <button class="secondary" type="button" data-probe-index="${index}">设为下一问</button>
              </div>
            `
          )
          .join("");
        probeList.querySelectorAll("[data-probe-index]").forEach((button) => {
          button.addEventListener("click", () => {
            const item = suggestions[Number(button.dataset.probeIndex)];
            selectQuestion(item.question, {
              questionSource: "ai_probe",
              probeTarget: item.target,
              competency: item.competency,
            });
          });
        });
      }

      function selectQuestion(question, meta = {}) {
        currentQuestion.value = question;
        state.selectedQuestionSource = meta.questionSource || "interviewer";
        state.selectedProbeTarget = meta.probeTarget || null;
        state.selectedCompetency = meta.competency || null;
        appendEvent(
          "下一问",
          `${escapeHtml(question)}<br><span class="small">${escapeHtml(meta.competency || "自定义问题")}</span>`
        );
        answerText.focus();
      }

      async function prepareSession(form) {
        if (state.preparingInterview) {
          appendEvent("面试创建", "正在创建实时面试，请稍候。");
          return;
        }
        if (state.interview) {
          appendEvent("面试创建", "当前已有面试，请重置后再创建新的面试。", "red");
          return;
        }
        state.preparingInterview = true;
        closeSocket();
        stopMicCapture();
        state.interviewEnded = false;
        state.reportReady = false;
        state.seq = 1;
        state.turns = 0;
        state.startedAt = Date.now();
        metricTurns.textContent = "0";
        reportLinks.innerHTML = "";
        reportPanel.innerHTML = '<div class="empty">结束面试后生成综合评分</div>';
        credibilityLevel.textContent = "待观察";
        credibilityBox.innerHTML = "<p>等待候选人首个回答。</p>";
        liveFeed.innerHTML = '<div class="empty">实时转写、回答和追问事件会出现在这里</div>';
        setPill(setupStatus, "创建中", "live");
        setControls();
        try {
          const job = await postJson("/api/jobs", {
            title: form.job_title.value.trim(),
            jd_text: form.jd_text.value.trim(),
          });
          const candidate = await postJson("/api/candidates", {
            name: form.candidate_name.value.trim(),
            resume_text: form.resume_text.value.trim(),
          });
          const interview = await postJson("/api/interviews", {
            job_id: job.id,
            candidate_id: candidate.id,
          });
          state.job = job;
          state.candidate = candidate;
          state.interview = interview;
          metricJob.textContent = job.title;
          metricCandidate.textContent = candidate.name;
          renderCompetencies(job);
          await openSocketWithLatestGateway(interview.id);
          setPill(setupStatus, "已建面试", "ready");
          appendEvent("面试创建", `${escapeHtml(job.title)} · ${escapeHtml(candidate.name)}`);
        } catch (error) {
          setPill(setupStatus, "创建失败", "");
          appendEvent("错误", escapeHtml(errorText(error)), "red");
        } finally {
          state.preparingInterview = false;
          setControls();
        }
      }

      async function openSocketWithLatestGateway(interviewId) {
        try {
          await discoverGateway();
        } catch (error) {
          appendEvent(
            "实时通道",
            `连接前无法确认本地 gateway：${escapeHtml(errorText(error))}`,
            "red"
          );
        }
        openSocket(interviewId);
      }

      function openSocket(interviewId) {
        const socketUrl = wsUrl(`/ws/interview/${interviewId}`);
        try {
          state.socket = new WebSocket(socketUrl, websocketProtocols());
        } catch (error) {
          state.socket = null;
          setControls();
          appendEvent("实时通道", `WebSocket 初始化失败：${escapeHtml(errorText(error))}`, "red");
          return;
        }
        setControls();
        state.socket.addEventListener("open", () => {
          setControls();
          appendEvent("实时通道", "WebSocket 已打开。");
        });
        state.socket.addEventListener("close", () => {
          stopMicCapture();
          setControls();
          appendEvent("实时通道", "WebSocket 已关闭。可点击重连通道继续当前面试。");
        });
        state.socket.addEventListener("error", () => {
          setControls();
          appendEvent(
            "实时通道",
            "WebSocket 连接失败，请检查服务是否仍在运行；恢复后点击重连通道继续当前面试。",
            "red"
          );
        });
        state.socket.addEventListener("message", (event) => {
          renderLiveMessage(JSON.parse(event.data));
        });
      }

      async function reconnectLiveChannel() {
        if (!state.interview) {
          appendEvent("实时通道", "请先创建实时面试。", "red");
          return;
        }
        if (state.interviewEnded) {
          appendEvent("实时通道", "面试已结束，请重置后创建新的面试。", "red");
          return;
        }
        if (state.socket && state.socket.readyState === WebSocket.OPEN) {
          appendEvent("实时通道", "当前实时通道已经连接。");
          return;
        }
        if (state.socket && state.socket.readyState === WebSocket.CONNECTING) {
          appendEvent("实时通道", "实时通道正在连接中。");
          return;
        }
        stopMicCapture();
        await openSocketWithLatestGateway(state.interview.id);
        appendEvent("实时通道", "正在重新连接当前面试。");
      }

      function closeSocket() {
        if (
          state.socket &&
          (state.socket.readyState === WebSocket.OPEN ||
            state.socket.readyState === WebSocket.CONNECTING)
        ) {
          state.socket.close();
        }
        state.socket = null;
        setControls();
      }

      function turnTiming() {
        const start = Math.max(0, Date.now() - state.startedAt);
        const estimated = Math.max(1200, Math.min(30000, answerText.value.length * 220));
        return { start_ms: Math.round(start), end_ms: Math.round(start + estimated) };
      }

      function eventQuestionMeta() {
        return {
          question: currentQuestion.value.trim(),
          question_source: state.selectedQuestionSource,
          probe_target: state.selectedProbeTarget,
        };
      }

      function sendTurn(manual = false) {
        if (!state.socket || state.socket.readyState !== WebSocket.OPEN) return;
        if (state.interviewEnded) {
          appendEvent("面试已结束", "请重置后创建新的面试。", "red");
          return;
        }
        const answer = answerText.value.trim();
        const question = currentQuestion.value.trim();
        if (!answer || !question) {
          appendEvent("输入缺失", "当前问题和候选人回答都需要填写。", "red");
          return;
        }
        const timing = turnTiming();
        const payload = manual
          ? {
              type: "manual_probe",
              answer,
              confidence: 1,
              ...timing,
              ...eventQuestionMeta(),
            }
          : {
              type: "text_turn",
              seq: state.seq++,
              answer,
              speaker: "candidate",
              confidence: 1,
              ...timing,
              ...eventQuestionMeta(),
            };
        state.socket.send(JSON.stringify(payload));
        appendEvent(
          manual ? "追问触发" : "回答已发送",
          `<span class="small">Q</span> ${escapeHtml(question)}<br><span class="small">A</span> ${escapeHtml(answer)}`
        );
      }

      function renderLiveMessage(message) {
        if (message.type === "transcript") {
          state.turns += message.payload.speaker === "candidate" && message.payload.is_final ? 1 : 0;
          metricTurns.textContent = String(state.turns);
          appendEvent(
            "转写",
            `${escapeHtml(message.payload.speaker)} · ${escapeHtml(message.payload.text)}`
          );
        } else if (message.type === "probe") {
          renderProbeCards(message.payload.suggestions || []);
          appendEvent("追问方向", "已生成新的专业问题候选。", "blue");
        } else if (message.type === "credibility") {
          credibilityLevel.textContent = message.payload.level;
          credibilityBox.innerHTML = `
            <h3>${escapeHtml(message.payload.reason)}</h3>
            <p>${escapeHtml(message.payload.drill_down_hint)}</p>
          `;
        } else if (message.type === "signal") {
          appendEvent(
            "行为信号",
            `fluency ${escapeHtml(message.payload.fluency)} · hesitation ${escapeHtml(message.payload.hesitation)}`
          );
        } else if (message.type === "asr_warning") {
          appendEvent("ASR", formatAsrWarning(message.payload.reason), "red");
        } else if (message.type === "report") {
          stopMicCapture();
          state.interviewEnded = true;
          renderReport(message.payload);
          markReportReady();
          appendEvent("评分完成", `总分 ${escapeHtml(message.payload.score.total_score)}`, "green");
        } else if (message.type === "task_queued") {
          stopMicCapture();
          state.interviewEnded = true;
          renderQueuedReportState(state.interview.id);
          appendEvent(
            "任务已排队",
            `${escapeHtml(message.payload.task_name)} · ${escapeHtml(message.payload.task_id)}。请等待后台评分完成。`
          );
        } else if (message.type === "error") {
          appendEvent("错误", escapeHtml(message.detail || "unknown error"), "red");
        }
        setControls();
      }

      function formatAsrWarning(reason) {
        const raw = String(reason || "unknown");
        const normalized = raw.toLowerCase();
        let message = "ASR 转写暂时不可用，请重试或改用文本回答。";
        if (normalized.includes("idle_timeout")) {
          message = "ASR 长时间没有收到有效语音：请点击停止麦克风后重新开始，并在开启后直接说话。";
        } else if (
          normalized.includes("40000002") ||
          normalized.includes("bad token") ||
          normalized.includes("invalid token")
        ) {
          message =
            "ASR Token 已失效或被拒绝：自动 Token 模式会尝试刷新；如果仍失败，请检查 ALIYUN_NLS_TOKEN 或阿里云 AccessKey 权限。";
        } else if (
          normalized.includes("invalidapikey") ||
          normalized.includes("invalid api key") ||
          normalized.includes("bad key")
        ) {
          message = "阿里云 ASR API Key 无效：请检查 ALIYUN_ASR_API_KEY 是否是百炼/DashScope API Key。";
        } else if (normalized.includes("createtoken failed")) {
          message = "NLS Token 创建失败：请检查 ALIYUN_AK_ID、ALIYUN_AK_SECRET 和账号权限。";
        } else if (raw === "aliyun_asr_disconnected") {
          message = "ASR 连接已断开：请停止麦克风后重新开始。";
        } else if (raw === "aliyun_asr_websockets_dependency_missing") {
          message = "ASR WebSocket 依赖缺失：请重新安装依赖后启动服务。";
        } else if (raw === "aliyun_asr_no_result") {
          message = "ASR 没有返回识别文本：请靠近麦克风重试，或先用文本框发送回答。";
        } else if (raw === "asr_transcription_failed") {
          message = "ASR 转写失败：请重新说一遍，或先用文本框发送回答。";
        } else if (raw === "invalid_audio_base64") {
          message = "音频数据无效：请重新开启麦克风。";
        } else if (raw === "unsupported_audio_format") {
          message = "音频格式不支持：浏览器应发送 16k PCM16 单声道音频。";
        } else if (raw === "unsupported_sample_rate") {
          message = "音频采样率不支持：需要 16000 Hz。";
        } else if (raw === "unsupported_channel_count") {
          message = "音频声道数不支持：需要单声道。";
        } else if (raw === "duplicate_final_segment") {
          message = "已忽略重复的最终转写片段。";
        } else if (raw === "session_id_mismatch") {
          message = "音频会话和当前面试不匹配：请重置后重新创建面试。";
        } else if (raw === "invalid_seq") {
          message = "音频序号无效：请重置会话后重试。";
        }
        return `${escapeHtml(message)}<br><span class="small">原始原因：${escapeHtml(raw)}</span>`;
      }

      function recommendationLabel(value) {
        return {
          strong_yes: "强烈推荐",
          yes: "推荐",
          hold: "待定",
          no: "不推荐",
        }[value] || value;
      }

      function renderReport(report) {
        const score = report.score;
        reportLinks.innerHTML = `
          <button class="secondary" type="button" data-report-format="html" data-report-id="${escapeHtml(report.interview_id)}">HTML</button>
          <button class="secondary" type="button" data-report-format="pdf" data-report-id="${escapeHtml(report.interview_id)}">PDF</button>
          <button class="secondary" type="button" data-report-format="json" data-report-id="${escapeHtml(report.interview_id)}">JSON</button>
          <button class="secondary" type="button" data-report-format="transcript.json" data-report-id="${escapeHtml(report.interview_id)}">转写</button>
        `;
        reportLinks.querySelectorAll("[data-report-format]").forEach((button) => {
          button.addEventListener("click", () => {
            downloadReportArtifact(button.dataset.reportId, button.dataset.reportFormat);
          });
        });
        const rows = score.dimensions
          .map(
            (dimension) => `
              <tr>
                <td>${escapeHtml(dimension.dimension)}</td>
                <td>${escapeHtml(dimension.score)}</td>
                <td>${dimension.evidence.map((item) => escapeHtml(item.excerpt)).join("<br>")}</td>
              </tr>
            `
          )
          .join("");
        const risks = score.risk_notes.length
          ? score.risk_notes.map((note) => `<p class="risk">${escapeHtml(note)}</p>`).join("")
          : '<p class="success">暂无高置信风险点。</p>';
        const transcript = report.transcript
          .map(
            (turn, index) => `
              <tr>
                <td>${index + 1}</td>
                <td>${escapeHtml(turn.question)}</td>
                <td>${escapeHtml(turn.answer)}</td>
              </tr>
            `
          )
          .join("");
        reportPanel.innerHTML = `
          <div class="report-box">
            <div class="score-line">
              <div class="score-main"><strong>${escapeHtml(score.total_score)}</strong><span>${escapeHtml(recommendationLabel(score.recommendation))}</span></div>
              <div class="stack">
                <h3>总评</h3>
                <p>${escapeHtml(report.summary)}</p>
                ${report.candidate_resume_text ? `<p><strong>简历摘要：</strong>${escapeHtml(report.candidate_resume_text)}</p>` : ""}
              </div>
            </div>
            <div>${risks}</div>
            <table>
              <thead><tr><th>维度</th><th>分数</th><th>证据</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <table>
              <thead><tr><th>#</th><th>问题</th><th>回答</th></tr></thead>
              <tbody>${transcript}</tbody>
            </table>
          </div>
        `;
      }

      function renderQueuedReportState(interviewId) {
        reportLinks.innerHTML = `
          <button class="secondary" type="button" id="refreshReport" data-report-id="${escapeHtml(interviewId)}">刷新报告</button>
        `;
        reportLinks.querySelector("#refreshReport").addEventListener("click", (event) => {
          refreshQueuedReport(event.currentTarget.dataset.reportId);
        });
        reportPanel.innerHTML = '<div class="empty">后台评分任务已排队，请稍后刷新报告。</div>';
      }

      async function refreshQueuedReport(interviewId) {
        const button = reportLinks.querySelector("#refreshReport");
        const originalLabel = button ? button.textContent : "";
        if (button) {
          button.disabled = true;
          button.textContent = "刷新中";
        }
        try {
          const report = await fetchGatewayJson(`/api/interviews/${interviewId}/report`);
          renderReport(report);
          markReportReady();
          appendEvent("评分完成", `总分 ${escapeHtml(report.score.total_score)}`, "green");
        } catch (error) {
          if (gatewayAuthError(error)) {
            showGatewayKeyRequired("报告刷新");
          } else if (reportPendingError(error)) {
            appendEvent("报告刷新", "报告仍在生成中，请稍后再刷新。");
          } else {
            appendEvent("报告刷新失败", escapeHtml(errorText(error)), "red");
          }
        } finally {
          if (button && reportLinks.contains(button)) {
            button.disabled = false;
            button.textContent = originalLabel || "刷新报告";
          }
        }
      }

      function reportPendingError(error) {
        return errorText(error).toLowerCase().includes("report not found");
      }

      function markReportReady() {
        state.reportReady = true;
        setPill(liveStatus, "报告已生成", "ready");
      }

      async function downloadReportArtifact(interviewId, format) {
        if (!interviewId || !format) return;
        const button = reportLinks.querySelector(`[data-report-format="${format}"]`);
        if (button) button.disabled = true;
        try {
          const response = await fetchGateway(`/api/interviews/${interviewId}/report.${format}`);
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = reportFilename(interviewId, format);
          document.body.append(anchor);
          anchor.click();
          anchor.remove();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
          appendEvent("报告下载", `${escapeHtml(reportFormatLabel(format))} 已开始下载。`, "green");
        } catch (error) {
          if (gatewayAuthError(error)) {
            showGatewayKeyRequired("报告下载");
          } else {
            appendEvent("报告下载失败", escapeHtml(errorText(error)), "red");
          }
        } finally {
          if (button) button.disabled = false;
        }
      }

      function reportFilename(interviewId, format) {
        if (format === "pdf") return `${interviewId}.pdf`;
        if (format === "transcript.json") return `${interviewId}.transcript.json`;
        return `${interviewId}.report.${format}`;
      }

      function reportFormatLabel(format) {
        return {
          html: "HTML",
          pdf: "PDF",
          json: "JSON",
          "transcript.json": "转写",
        }[format] || format;
      }

      function downsampleBuffer(buffer, inputRate, outputRate) {
        if (inputRate === outputRate) return buffer;
        const ratio = inputRate / outputRate;
        const length = Math.floor(buffer.length / ratio);
        const result = new Float32Array(length);
        for (let index = 0; index < length; index += 1) {
          const sourceIndex = index * ratio;
          const before = Math.floor(sourceIndex);
          const after = Math.min(before + 1, buffer.length - 1);
          const weight = sourceIndex - before;
          result[index] = buffer[before] * (1 - weight) + buffer[after] * weight;
        }
        return result;
      }

      function samplesToBase64Pcm16(samples) {
        const buffer = new ArrayBuffer(samples.length * 2);
        const view = new DataView(buffer);
        for (let index = 0; index < samples.length; index += 1) {
          const sample = Math.max(-1, Math.min(1, samples[index]));
          view.setInt16(index * 2, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
        }
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let offset = 0; offset < bytes.length; offset += 0x8000) {
          const chunk = bytes.subarray(offset, offset + 0x8000);
          binary += String.fromCharCode(...chunk);
        }
        return btoa(binary);
      }

      function appendMicSamples(samples) {
        for (let index = 0; index < samples.length; index += 1) {
          state.micSamples.push(samples[index]);
        }
        while (state.micSamples.length >= micChunkSamples) {
          sendMicSamples(state.micSamples.splice(0, micChunkSamples));
        }
      }

      function sendMicSamples(samples) {
        if (!state.socket || state.socket.readyState !== WebSocket.OPEN || samples.length === 0) return;
        if (!state.micSpeechStarted) {
          if (!hasVoiceEnergy(samples)) {
            if (!state.micWaitingForVoiceNotice) {
              appendEvent(
                "麦克风",
                "已开启采集，等待检测到候选人声音；期间会发送低音量保活音频，避免 ASR 空闲断开。"
              );
              setPill(micStatus, "等待声音输入", "live");
              state.micWaitingForVoiceNotice = true;
            }
          } else {
            state.micSpeechStarted = true;
            state.micWaitingForVoiceNotice = false;
            appendEvent("麦克风", "检测到声音，开始发送 ASR 音频。");
          }
        }
        const startMs = Math.round((state.micSentSamples / micSampleRate) * 1000);
        state.micSentSamples += samples.length;
        const endMs = Math.round((state.micSentSamples / micSampleRate) * 1000);
        state.socket.send(
          JSON.stringify({
            type: "audio_chunk",
            session_id: state.interview.id,
            seq: state.seq++,
            audio: samplesToBase64Pcm16(samples),
            speaker: "candidate",
            format: "pcm16",
            sample_rate_hz: micSampleRate,
            channels: 1,
            start_ms: startMs,
            end_ms: endMs,
            is_final: true,
            confidence: 0.95,
            ...eventQuestionMeta(),
          })
        );
      }

      function hasVoiceEnergy(samples) {
        let sum = 0;
        for (let index = 0; index < samples.length; index += 1) {
          sum += samples[index] * samples[index];
        }
        return Math.sqrt(sum / samples.length) >= micVoiceRmsThreshold;
      }

      function audioContextConstructor() {
        return window.AudioContext || window.webkitAudioContext;
      }

      function nextMicStartToken() {
        state.micStartToken += 1;
        return state.micStartToken;
      }

      function micStartStillCurrent(token) {
        return (
          token === state.micStartToken &&
          !state.interviewEnded &&
          state.socket &&
          state.socket.readyState === WebSocket.OPEN
        );
      }

      function stopMediaStream(stream) {
        if (stream) stream.getTracks().forEach((track) => track.stop());
      }

      async function startMicCapture() {
        if (state.interviewEnded) {
          appendEvent("麦克风", "面试已结束，请重置后创建新的面试。", "red");
          return;
        }
        if (
          state.micStarting ||
          state.micRecording ||
          !state.socket ||
          state.socket.readyState !== WebSocket.OPEN
        ) {
          return;
        }
        const micStartToken = nextMicStartToken();
        state.micStarting = true;
        state.micError = "";
        setControls();
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          state.micError = "麦克风不可用";
          appendEvent("麦克风", "当前浏览器不支持麦克风采集。", "red");
          state.micStarting = false;
          setControls();
          return;
        }
        const AudioContextCtor = audioContextConstructor();
        if (!AudioContextCtor) {
          state.micError = "音频采集不可用";
          appendEvent("麦克风", "当前浏览器不支持 Web Audio，无法采集和转换麦克风音频。", "red");
          state.micStarting = false;
          setControls();
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
          if (!micStartStillCurrent(micStartToken)) {
            stopMediaStream(stream);
            appendEvent("麦克风", "麦克风启动已取消：实时通道已断开或面试已重置。", "red");
            return;
          }
          state.micStream = stream;
          state.micContext = new AudioContextCtor();
          state.micSource = state.micContext.createMediaStreamSource(state.micStream);
          state.micProcessor = state.micContext.createScriptProcessor(4096, 1, 1);
          state.micSamples = [];
          state.micSentSamples = 0;
          state.micSpeechStarted = false;
          state.micWaitingForVoiceNotice = false;
          state.micError = "";
          state.micStarting = false;
          state.micRecording = true;
          state.micProcessor.onaudioprocess = (event) => {
            const input = event.inputBuffer.getChannelData(0);
            const output = event.outputBuffer.getChannelData(0);
            output.fill(0);
            appendMicSamples(downsampleBuffer(input, state.micContext.sampleRate, micSampleRate));
          };
          state.micSource.connect(state.micProcessor);
          state.micProcessor.connect(state.micContext.destination);
          appendEvent("麦克风", "麦克风已开启，请开始说话。");
          setControls();
        } catch (error) {
          const reason = micErrorMessage(error);
          state.micError = reason;
          appendEvent("麦克风", escapeHtml(reason), "red");
          stopMicCapture();
        } finally {
          if (micStartToken === state.micStartToken && state.micStarting) {
            state.micStarting = false;
            setControls();
          }
        }
      }

      function micErrorMessage(error) {
        const name = error && error.name ? error.name : "";
        if (name === "NotAllowedError" || name === "SecurityError") {
          return "麦克风权限被拒绝：请在浏览器站点权限和 macOS 系统设置中允许当前浏览器使用麦克风。";
        }
        if (name === "NotFoundError" || name === "DevicesNotFoundError") {
          return "未找到可用麦克风：请确认系统已连接输入设备。";
        }
        if (name === "NotReadableError" || name === "TrackStartError") {
          return "麦克风被其他程序占用，或系统暂时无法读取。";
        }
        return `麦克风启动失败：${error}`;
      }

      function stopMicCapture() {
        if (state.micStarting) {
          nextMicStartToken();
          state.micStarting = false;
        }
        if (!state.micRecording && !state.micStream && !state.micContext) {
          setControls();
          return;
        }
        if (state.micSamples.length > 0) {
          sendMicSamples(state.micSamples.splice(0, state.micSamples.length));
        }
        state.micRecording = false;
        if (state.micProcessor) {
          state.micProcessor.disconnect();
          state.micProcessor.onaudioprocess = null;
        }
        if (state.micSource) state.micSource.disconnect();
        if (state.micStream) stopMediaStream(state.micStream);
        if (state.micContext && state.micContext.state !== "closed") {
          state.micContext.close().catch(() => {});
        }
        state.micStream = null;
        state.micContext = null;
        state.micSource = null;
        state.micProcessor = null;
        state.micSamples = [];
        state.micSpeechStarted = false;
        state.micWaitingForVoiceNotice = false;
        setControls();
      }

      function loadSample() {
        setupForm.job_title.value = "高级 AI 后端工程师";
        setupForm.candidate_name.value = "张三";
        jdText.value =
          "负责 LLM 应用平台、FastAPI 微服务、模型调用编排、可靠性治理、评估报告与线上故障排查。要求能独立做技术方案、指标设计、降级策略和跨团队协作。";
        resumeText.value =
          "候选人自述 5 年 Python 后端经验，最近负责 AI 面试评估系统，涉及 FastAPI 网关、LLM JSON 解析、重试降级、报告生成和可观测性指标。";
        currentQuestion.value =
          "请讲一个最近负责的 LLM 后端项目，说明你本人写了哪些模块，核心技术取舍是什么，上线后哪些指标发生了变化？";
        answerText.value =
          "我主要写了 FastAPI 网关和模型调用编排，处理过 JSON 解析失败、超时重试和报告生成。我把失败重试从固定次数改成按错误类型分流，P95 延迟从 3.8 秒降到 2.4 秒。";
        appendEvent("样例资料", "已填入一组 JD、简历和首问回答。");
      }

      function resetSessionState() {
        stopMicCapture();
        closeSocket();
        nextMicStartToken();
        state.job = null;
        state.candidate = null;
        state.interview = null;
        state.preparingInterview = false;
        state.seq = 1;
        state.turns = 0;
        state.interviewEnded = false;
        state.reportReady = false;
        state.selectedQuestionSource = "interviewer";
        state.selectedProbeTarget = null;
        state.selectedCompetency = null;
        state.micStarting = false;
        state.micError = "";
        metricJob.textContent = "待创建";
        metricCandidate.textContent = "待创建";
        metricTurns.textContent = "0";
        competencyList.innerHTML = '<div class="empty">创建面试后显示岗位能力维度</div>';
        renderProbeCards([]);
        credibilityLevel.textContent = "待观察";
        credibilityBox.innerHTML = "<p>等待候选人首个回答。</p>";
        liveFeed.innerHTML = '<div class="empty">实时转写、回答和追问事件会出现在这里</div>';
        reportLinks.innerHTML = "";
        reportPanel.innerHTML = '<div class="empty">结束面试后生成综合评分</div>';
        setPill(setupStatus, "未建面试", "");
        setControls();
      }

      setupForm.addEventListener("submit", (event) => {
        event.preventDefault();
        prepareSession(event.currentTarget);
      });

      interviewForm.addEventListener("submit", (event) => {
        event.preventDefault();
        sendTurn(false);
      });

      document.querySelector("#jdFile").addEventListener("change", (event) => {
        parseDocumentFile(event.target.files[0], event.target, jdText, "JD", "jd");
      });

      document.querySelector("#resumeFile").addEventListener("change", (event) => {
        parseDocumentFile(event.target.files[0], event.target, resumeText, "简历", "resume");
      });

      refreshStatus.addEventListener("click", checkRuntime);
      checkModel.addEventListener("click", checkLlmConnection);
      checkAsr.addEventListener("click", checkAsrReadiness);
      saveGatewayKey.addEventListener("click", saveGatewayApiKey);
      gatewayKey.addEventListener("keydown", (event) => {
        if (event.key === "Enter") saveGatewayApiKey();
      });
      document.querySelector("#loadSample").addEventListener("click", loadSample);
      document.querySelector("#resetSession").addEventListener("click", resetSessionState);
      startMic.addEventListener("click", startMicCapture);
      stopMic.addEventListener("click", stopMicCapture);
      reconnectSocket.addEventListener("click", reconnectLiveChannel);
      manualProbe.addEventListener("click", () => sendTurn(true));
      endInterview.addEventListener("click", () => {
        stopMicCapture();
        if (state.socket && state.socket.readyState === WebSocket.OPEN) {
          endInterview.disabled = true;
          endInterview.title = "正在结束面试并生成评分报告";
          setPill(liveStatus, "评分中", "live");
          state.socket.send(JSON.stringify({ type: "end" }));
        }
      });

      gatewayKey.value = state.gatewayApiKey;
      checkRuntime();
      loadSample();
      setControls();
    </script>
  </body>
</html>
