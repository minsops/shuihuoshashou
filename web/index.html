<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>水货杀手</title>
    <style>
      :root {
        color-scheme: light;
        --bg: oklch(0.97 0.01 178);
        --surface: oklch(0.995 0.004 178);
        --ink: oklch(0.22 0.03 238);
        --muted: oklch(0.49 0.028 236);
        --line: oklch(0.88 0.015 220);
        --teal: oklch(0.46 0.105 183);
        --teal-deep: oklch(0.34 0.09 184);
        --amber: oklch(0.72 0.145 74);
        --red: oklch(0.52 0.17 29);
        --green: oklch(0.5 0.13 148);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 16px 64px;
        display: grid;
        gap: 16px;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 4px 0;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      h1 small {
        margin-left: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
      }

      h2,
      h3,
      p {
        margin: 0;
      }

      h2 {
        font-size: 16px;
      }

      h3 {
        font-size: 14px;
      }

      .card {
        display: grid;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        background: var(--surface);
      }

      .muted,
      .small {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }

      textarea,
      input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--surface);
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        line-height: 1.5;
        outline: none;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      textarea:focus,
      input:focus {
        border-color: var(--teal);
      }

      .file-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .file-row input[type="file"] {
        font-size: 12px;
        color: var(--muted);
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border: 1px solid var(--teal);
        border-radius: 8px;
        padding: 10px 18px;
        background: var(--teal);
        color: #fff;
        font: inherit;
        font-size: 15px;
        font-weight: 650;
        cursor: pointer;
      }

      button.danger {
        border-color: var(--red);
        background: var(--red);
      }

      button.subtle {
        min-height: 36px;
        border-color: var(--line);
        background: var(--surface);
        color: var(--teal-deep);
        font-size: 13px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .status-line {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .status-line::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--muted);
        flex: 0 0 auto;
      }

      .status-line.live::before {
        background: var(--amber);
      }

      .status-line.ready::before {
        background: var(--green);
      }

      .status-line.warn::before {
        background: var(--red);
      }

      .question-text {
        font-size: 19px;
        font-weight: 700;
        line-height: 1.5;
      }

      .option-list {
        display: grid;
        gap: 8px;
      }

      .answer-box {
        display: grid;
        gap: 6px;
        min-height: 72px;
        max-height: 200px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: oklch(0.985 0.008 178);
        font-size: 14px;
        line-height: 1.6;
      }

      .answer-box .placeholder {
        color: var(--muted);
        font-size: 13px;
      }

      .answer-box .seg {
        margin: 0;
      }

      .answer-box .seg .who {
        color: var(--teal-deep);
        font-size: 12px;
        font-weight: 700;
        margin-right: 6px;
      }

      .option-card {
        display: grid;
        gap: 4px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: var(--surface);
        text-align: left;
        cursor: pointer;
        font: inherit;
        color: var(--ink);
        min-height: 0;
        font-weight: 500;
      }

      .option-card:hover {
        border-color: var(--teal);
      }

      .option-card .kind {
        color: var(--teal-deep);
        font-size: 12px;
        font-weight: 700;
      }

      .option-card .reason {
        color: var(--muted);
        font-size: 12px;
      }

      .feed {
        display: grid;
        gap: 8px;
        max-height: 320px;
        overflow: auto;
      }

      .event {
        border-left: 3px solid var(--line);
        padding: 2px 0 2px 10px;
        font-size: 13px;
        line-height: 1.55;
      }

      .event strong {
        color: var(--muted);
        font-size: 12px;
        margin-right: 6px;
      }

      .event.red {
        border-left-color: var(--red);
      }

      .event.green {
        border-left-color: var(--green);
      }

      .event.blue {
        border-left-color: var(--teal);
      }

      .fallback-input {
        display: flex;
        gap: 8px;
      }

      .fallback-input input {
        flex: 1;
      }

      .score-line {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .score-main {
        display: grid;
        place-items: center;
        min-width: 96px;
        min-height: 96px;
        border-radius: 12px;
        background: var(--ink);
        color: var(--surface);
      }

      .score-main strong {
        font-size: 34px;
        line-height: 1.1;
      }

      .score-main span {
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 8px 6px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
      }

      .risk {
        color: var(--red);
      }

      .success {
        color: var(--green);
      }

      .links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .links a {
        color: var(--teal-deep);
        font-size: 13px;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>水货杀手<small>AI 实时深挖面试官</small></h1>
        <span class="status-line" id="statusLine" role="status" aria-live="polite">检查本地服务中</span>
      </header>

      <section class="card" id="setupCard">
        <h2>1 · 粘贴 JD 和简历，开始面试</h2>
        <label>
          岗位 JD
          <textarea id="jdText" placeholder="粘贴岗位描述，或上传文件"></textarea>
          <span class="file-row">
            <input type="file" id="jdFile" accept=".txt,.md,.markdown,.json,.csv,.log,.pdf,.doc,.docx,.png,.jpg,.jpeg,.webp,.bmp,.tif,.tiff,.heic,application/pdf,image/*" />
            <span class="small" id="jdFileStatus"></span>
          </span>
        </label>
        <label>
          候选人简历
          <textarea id="resumeText" placeholder="粘贴简历内容，或上传文件"></textarea>
          <span class="file-row">
            <input type="file" id="resumeFile" accept=".txt,.md,.markdown,.json,.csv,.log,.pdf,.doc,.docx,.png,.jpg,.jpeg,.webp,.bmp,.tif,.tiff,.heic,application/pdf,image/*" />
            <span class="small" id="resumeFileStatus"></span>
          </span>
        </label>
        <button type="button" id="startInterview">开始面试</button>
        <p class="small">点击后会自动生成题库、连接实时通道并打开麦克风。面试在微信或腾讯会议里进行也没问题：把声音外放，让麦克风同时听到双方即可。</p>
      </section>

      <section class="card" id="liveCard" hidden>
        <h2>2 · 面试进行中</h2>
        <div>
          <p class="small" id="currentQuestionMeta">当前问题</p>
          <p class="question-text" id="currentQuestionText">正在生成首题…</p>
        </div>
        <div>
          <p class="small">面试者回答（实时语音转写）</p>
          <div class="answer-box" id="answerBox" role="log" aria-live="polite">
            <p class="placeholder">等待语音输入…麦克风听到声音后，转写会实时出现在这里。</p>
          </div>
        </div>
        <div class="option-list" id="nextOptionList"></div>
        <div class="feed" id="liveFeed" role="log" aria-live="polite"></div>
        <div class="fallback-input" id="fallbackInput" hidden>
          <input type="text" id="fallbackText" placeholder="麦克风不可用时，可在这里手动输入候选人回答" />
          <button type="button" class="subtle" id="fallbackSend">发送</button>
        </div>
        <button type="button" class="danger" id="endInterview">结束面试，生成评分报告</button>
      </section>

      <section class="card" id="reportCard" hidden>
        <h2>3 · 评分报告</h2>
        <div id="reportPanel"></div>
        <div class="links" id="reportLinks"></div>
        <button type="button" class="subtle" id="newInterview">开始新的面试</button>
      </section>
    </main>

    <script>
      const statusLine = document.querySelector("#statusLine");
      const setupCard = document.querySelector("#setupCard");
      const liveCard = document.querySelector("#liveCard");
      const reportCard = document.querySelector("#reportCard");
      const jdText = document.querySelector("#jdText");
      const resumeText = document.querySelector("#resumeText");
      const startInterview = document.querySelector("#startInterview");
      const endInterview = document.querySelector("#endInterview");
      const newInterview = document.querySelector("#newInterview");
      const currentQuestionText = document.querySelector("#currentQuestionText");
      const currentQuestionMeta = document.querySelector("#currentQuestionMeta");
      const nextOptionList = document.querySelector("#nextOptionList");
      const answerBox = document.querySelector("#answerBox");
      const liveFeed = document.querySelector("#liveFeed");
      const fallbackInput = document.querySelector("#fallbackInput");
      const fallbackText = document.querySelector("#fallbackText");
      const fallbackSend = document.querySelector("#fallbackSend");
      const reportPanel = document.querySelector("#reportPanel");
      const reportLinks = document.querySelector("#reportLinks");

      const micSampleRate = 16000;
      const micChunkSamples = Math.floor(micSampleRate / 4);
      const maxFeedEvents = 80;
      const reportPollIntervalMs = 3000;
      const reportPollMaxAttempts = 40;
      const reconnectDelaysMs = [1000, 2000, 4000, 8000];
      const fallbackGatewayOrigins = ["http://127.0.0.1:8001", "http://localhost:8001"];

      const state = {
        interview: null,
        phase: "idle",
        socket: null,
        socketToken: 0,
        seq: 1,
        startedAt: 0,
        reconnectAttempt: 0,
        reconnectTimer: null,
        currentQuestion: "",
        questionSource: "interviewer",
        probeTarget: null,
        probeChainId: null,
        mic: null,
        micSamples: [],
        micSentSamples: 0,
        reportPollTimer: null,
        reportPollAttempts: 0,
        parsingCount: 0,
        apiOrigin:
          window.location.origin && window.location.origin !== "null"
            ? window.location.origin
            : "http://127.0.0.1:8001",
        apiKey:
          new URLSearchParams(window.location.search).get("api_key") ||
          sessionStorage.getItem("gatewayApiKey") ||
          "",
      };
      if (state.apiKey) sessionStorage.setItem("gatewayApiKey", state.apiKey);

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setStatus(text, tone = "") {
        statusLine.textContent = text;
        statusLine.className = `status-line ${tone}`.trim();
      }

      function appendEvent(title, body, tone = "") {
        const node = document.createElement("div");
        node.className = `event ${tone}`.trim();
        node.innerHTML = `<strong>${escapeHtml(title)}</strong>${body}`;
        liveFeed.prepend(node);
        while (liveFeed.children.length > maxFeedEvents) {
          liveFeed.lastChild.remove();
        }
      }

      function errorText(error) {
        const message = error && error.message ? error.message : String(error);
        if (/failed to fetch|networkerror|load failed|abort/i.test(message)) {
          return "无法连接到本地服务，请确认已运行 python scripts/run_gateway.py";
        }
        return message;
      }

      function apiUrl(path) {
        return `${state.apiOrigin}${path.startsWith("/") ? path : `/${path}`}`;
      }

      function gatewayHeaders(headers = {}) {
        return state.apiKey ? { ...headers, "X-API-Key": state.apiKey } : headers;
      }

      async function discoverGateway() {
        const origins = [state.apiOrigin, ...fallbackGatewayOrigins].filter(
          (origin, index, list) => origin && list.indexOf(origin) === index
        );
        for (const origin of origins) {
          try {
            const response = await fetch(`${origin}/health`, { cache: "no-store" });
            if (!response.ok) continue;
            const status = await response.json();
            if (status.service !== "shuihuo-killer-gateway") continue;
            state.apiOrigin = origin;
            return status;
          } catch (error) {
            continue;
          }
        }
        throw new Error("找不到本地 gateway，请确认已运行 python scripts/run_gateway.py");
      }

      async function fetchGateway(path, options = {}) {
        const response = await fetch(apiUrl(path), {
          ...options,
          headers: gatewayHeaders(options.headers || {}),
        });
        if (!response.ok) {
          let detail = `HTTP ${response.status}`;
          try {
            const payload = await response.json();
            if (typeof payload.detail === "string") detail = payload.detail;
          } catch (error) {
            /* keep status text */
          }
          throw new Error(detail);
        }
        return response;
      }

      async function fetchGatewayJson(path, options = {}) {
        return (await fetchGateway(path, options)).json();
      }

      // ----- 资料上传 -----

      async function parseDocumentFile(file, input, target, statusNode, kind) {
        if (!file) return;
        statusNode.textContent = `正在解析 ${file.name}…`;
        state.parsingCount += 1;
        input.disabled = true;
        syncControls();
        try {
          const params = new URLSearchParams({ kind, filename: file.name });
          const result = await fetchGatewayJson(`/api/documents/parse?${params.toString()}`, {
            method: "POST",
            headers: { "content-type": file.type || "application/octet-stream" },
            body: await file.arrayBuffer(),
          });
          const parsedText = String(result.text || "").trim();
          if (!parsedText) {
            statusNode.textContent = "未提取到文本，请直接粘贴内容。";
            return;
          }
          target.value = parsedText;
          statusNode.textContent = `已解析 ${file.name}`;
        } catch (error) {
          statusNode.textContent = `解析失败：${errorText(error)}`;
        } finally {
          state.parsingCount = Math.max(0, state.parsingCount - 1);
          input.disabled = false;
          input.value = "";
          syncControls();
        }
      }

      // ----- 面试生命周期 -----

      function syncControls() {
        startInterview.disabled = state.parsingCount > 0 || state.phase !== "idle";
        endInterview.disabled = state.phase !== "live";
      }

      function showPhase(phase) {
        state.phase = phase;
        setupCard.hidden = phase !== "idle";
        liveCard.hidden = phase !== "live" && phase !== "scoring";
        reportCard.hidden = phase !== "report" && phase !== "queued";
        syncControls();
      }

      async function beginInterview() {
        const jd = jdText.value.trim();
        const resume = resumeText.value.trim();
        if (!jd || !resume) {
          setStatus("JD 和简历都需要填写", "warn");
          (jd ? resumeText : jdText).focus();
          return;
        }
        startInterview.disabled = true;
        setStatus("正在生成题库并创建面试…", "live");
        try {
          await discoverGateway();
          const setup = await fetchGatewayJson("/api/interviews/quick-setup", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ jd_text: jd, resume_text: resume }),
          });
          state.interview = { id: setup.interview_id, job_title: setup.job_title };
          state.seq = 1;
          state.startedAt = Date.now();
          state.reconnectAttempt = 0;
          liveFeed.innerHTML = "";
          nextOptionList.innerHTML = "";
          resetAnswerBox();
          currentQuestionText.textContent = "正在生成首题…";
          showPhase("live");
          appendEvent("面试", `${escapeHtml(setup.job_title)} · ${escapeHtml(setup.candidate_name)}`, "blue");
          renderBankOptions(setup.question_bank && setup.question_bank.items);
          openSocket();
        } catch (error) {
          setStatus(`创建失败：${errorText(error)}`, "warn");
          syncControls();
        }
      }

      function wsUrl(path) {
        const url = new URL(apiUrl(path));
        url.protocol = url.protocol === "https:" ? "wss:" : "ws:";
        if (state.apiKey) url.searchParams.set("api_key", state.apiKey);
        return url.toString();
      }

      function openSocket() {
        if (!state.interview) return;
        const socketToken = ++state.socketToken;
        let socket;
        try {
          socket = new WebSocket(wsUrl(`/ws/interview/${state.interview.id}`));
        } catch (error) {
          scheduleReconnect();
          return;
        }
        state.socket = socket;
        socket.addEventListener("open", () => {
          if (socketToken !== state.socketToken) return;
          state.reconnectAttempt = 0;
          setStatus("面试进行中 · 正在打开麦克风", "live");
          startMicCapture();
        });
        socket.addEventListener("close", () => {
          if (socketToken !== state.socketToken) return;
          stopMicCapture();
          if (state.phase === "live") scheduleReconnect();
        });
        socket.addEventListener("message", (event) => {
          if (socketToken !== state.socketToken) return;
          handleSocketMessage(event);
        });
      }

      function scheduleReconnect() {
        if (state.phase !== "live" || state.reconnectTimer) return;
        const delay =
          reconnectDelaysMs[Math.min(state.reconnectAttempt, reconnectDelaysMs.length - 1)];
        state.reconnectAttempt += 1;
        setStatus(`连接断开，${Math.round(delay / 1000)} 秒后自动重连…`, "warn");
        state.reconnectTimer = window.setTimeout(async () => {
          state.reconnectTimer = null;
          if (state.phase !== "live") return;
          try {
            await discoverGateway();
          } catch (error) {
            /* keep retrying */
          }
          openSocket();
        }, delay);
      }

      function closeSocket() {
        state.socketToken += 1;
        if (state.reconnectTimer) {
          window.clearTimeout(state.reconnectTimer);
          state.reconnectTimer = null;
        }
        if (
          state.socket &&
          (state.socket.readyState === WebSocket.OPEN ||
            state.socket.readyState === WebSocket.CONNECTING)
        ) {
          state.socket.close();
        }
        state.socket = null;
      }

      function socketReady() {
        return state.socket && state.socket.readyState === WebSocket.OPEN;
      }

      function sendPayload(payload) {
        if (!socketReady()) return false;
        try {
          state.socket.send(JSON.stringify(payload));
          return true;
        } catch (error) {
          return false;
        }
      }

      function questionMeta() {
        return {
          question: state.currentQuestion,
          question_source: state.questionSource,
          probe_target: state.probeTarget,
          chain_id: state.probeChainId,
        };
      }

      function requestEnd() {
        if (!socketReady()) {
          setStatus("通道未连接，正在重连后结束…", "warn");
          return;
        }
        stopMicCapture();
        state.phase = "scoring";
        syncControls();
        setStatus("正在评分，请稍候…", "live");
        sendPayload({ type: "end" });
      }

      function resetAll() {
        closeSocket();
        stopMicCapture();
        clearReportPolling();
        state.interview = null;
        state.seq = 1;
        state.currentQuestion = "";
        state.questionSource = "interviewer";
        state.probeTarget = null;
        state.probeChainId = null;
        liveFeed.innerHTML = "";
        nextOptionList.innerHTML = "";
        resetAnswerBox();
        reportPanel.innerHTML = "";
        reportLinks.innerHTML = "";
        fallbackInput.hidden = true;
        showPhase("idle");
        setStatus("准备就绪", "ready");
      }

      // ----- 实时消息 -----

      function handleSocketMessage(event) {
        let message;
        try {
          message = JSON.parse(event.data);
        } catch (error) {
          return;
        }
        if (!message || typeof message.type !== "string") return;
        renderLiveMessage(message);
      }

      function resetAnswerBox() {
        answerBox.innerHTML =
          '<p class="placeholder">等待语音输入…麦克风听到声音后，转写会实时出现在这里。</p>';
      }

      function speakerLabel(speaker) {
        return { candidate: "候选人", interviewer: "面试官" }[speaker] || "声音";
      }

      function appendTranscript(payload) {
        const text = String(payload.text || "").trim();
        if (!text) return;
        const placeholder = answerBox.querySelector(".placeholder");
        if (placeholder) placeholder.remove();
        const node = document.createElement("p");
        node.className = "seg";
        node.innerHTML = `<span class="who">${escapeHtml(speakerLabel(payload.speaker))}</span>${escapeHtml(text)}`;
        answerBox.append(node);
        while (answerBox.children.length > 30) {
          answerBox.firstChild.remove();
        }
        answerBox.scrollTop = answerBox.scrollHeight;
      }

      function setCurrentQuestion(question, meta = {}) {
        state.currentQuestion = question;
        state.questionSource = meta.questionSource || "interviewer";
        state.probeTarget = meta.probeTarget || null;
        state.probeChainId = meta.probeChainId || null;
        currentQuestionText.textContent = question;
        currentQuestionMeta.textContent = meta.label || "当前问题";
      }

      function renderNextOptions(options) {
        const followUp = Array.isArray(options && options.follow_up) ? options.follow_up : [];
        const alternatives = Array.isArray(options && options.alternatives)
          ? options.alternatives
          : [];
        const items = [
          ...followUp.map((option) => ({ ...option, groupLabel: "深挖" })),
          ...alternatives.map((option) => ({ ...option, groupLabel: "换题" })),
        ];
        nextOptionList.innerHTML = "";
        items.forEach((option) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "option-card";
          button.innerHTML = `
            <span class="kind">${escapeHtml(option.groupLabel)}</span>
            <span>${escapeHtml(option.question)}</span>
            ${option.reason ? `<span class="reason">${escapeHtml(option.reason)}</span>` : ""}
          `;
          button.addEventListener("click", () => {
            sendPayload({ type: "pick_option", option_id: option.option_id });
            setCurrentQuestion(option.question, {
              label: `${option.groupLabel} · 点击换题`,
              probeTarget: option.reason || null,
              probeChainId: option.chain_id || null,
            });
          });
          nextOptionList.append(button);
        });
      }

      function renderBankOptions(items) {
        const unasked = (Array.isArray(items) ? items : []).filter((item) => !item.asked);
        unasked.slice(0, 4).forEach((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "option-card";
          button.innerHTML = `
            <span class="kind">题库${item.category ? ` · ${escapeHtml(item.category)}` : ""}</span>
            <span>${escapeHtml(item.question)}</span>
          `;
          button.addEventListener("click", () => {
            setCurrentQuestion(item.question, { label: "题库" });
            button.remove();
          });
          nextOptionList.append(button);
        });
      }

      function renderProbeSuggestions(suggestions) {
        (suggestions || []).slice(0, 2).forEach((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "option-card";
          button.innerHTML = `
            <span class="kind">AI 追问 · ${escapeHtml(item.competency || "")}</span>
            <span>${escapeHtml(item.question)}</span>
          `;
          button.addEventListener("click", () => {
            setCurrentQuestion(item.question, {
              label: "AI 追问",
              questionSource: "ai_probe",
              probeTarget: item.target || null,
              probeChainId: item.chain_id || null,
            });
          });
          nextOptionList.prepend(button);
        });
        while (nextOptionList.children.length > 6) {
          nextOptionList.lastChild.remove();
        }
      }

      function renderLiveMessage(message) {
        const payload = message.payload || {};
        if (message.type === "transcript") {
          appendTranscript(payload);
        } else if (message.type === "current_question") {
          setCurrentQuestion(payload.question, { label: "系统首题" });
        } else if (message.type === "next_options" || message.type === "next_options_update") {
          renderNextOptions(payload);
        } else if (message.type === "turn") {
          appendEvent(
            "问答",
            `<span class="small">Q</span> ${escapeHtml(payload.question)}<br><span class="small">A</span> ${escapeHtml(payload.answer)}`,
            "blue"
          );
        } else if (message.type === "probe" || message.type === "probe_update") {
          renderProbeSuggestions(payload.suggestions);
        } else if (message.type === "credibility") {
          appendEvent(
            "可信度",
            `${escapeHtml(payload.level)} · ${escapeHtml(payload.reason || "")}`,
            payload.level === "solid" ? "green" : "red"
          );
        } else if (message.type === "report") {
          state.phase = "report";
          renderReport(payload);
          showPhase("report");
          setStatus("报告已生成", "ready");
        } else if (message.type === "task_queued") {
          state.phase = "queued";
          showPhase("queued");
          reportPanel.innerHTML = '<p class="small">后台评分中，报告会自动刷新…</p>';
          setStatus("后台评分中…", "live");
          scheduleReportPolling(state.interview.id);
        } else if (message.type === "asr_warning") {
          handleAsrWarning(String(payload.reason || ""));
        } else if (message.type === "error") {
          if (state.phase === "scoring") {
            state.phase = "live";
            syncControls();
          }
          appendEvent("提示", escapeHtml(formatLiveError(message.detail)), "red");
          setStatus("面试进行中", "live");
        }
      }

      function formatLiveError(detail) {
        const raw = String(detail || "");
        if (raw.includes("cannot finish interview without candidate turns")) {
          return "还没有候选人回答，再聊一会儿才能评分。";
        }
        return raw || "未知错误";
      }

      function handleAsrWarning(reason) {
        const quiet = ["duplicate_final_segment"];
        if (quiet.includes(reason)) return;
        appendEvent("语音识别", escapeHtml(reason), "red");
      }

      // ----- 麦克风（自动）-----

      async function startMicCapture() {
        if (state.mic || !socketReady()) return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          enableFallbackInput("当前浏览器不支持麦克风，可手动输入回答。");
          return;
        }
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextCtor) {
          enableFallbackInput("当前浏览器不支持音频采集，可手动输入回答。");
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              echoCancellation: false,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
          if (!socketReady() || state.phase !== "live") {
            stream.getTracks().forEach((track) => track.stop());
            return;
          }
          const context = new AudioContextCtor();
          const source = context.createMediaStreamSource(stream);
          const processor = context.createScriptProcessor(4096, 1, 1);
          state.mic = { stream, context, source, processor };
          state.micSamples = [];
          state.micSentSamples = 0;
          processor.onaudioprocess = (event) => {
            const input = event.inputBuffer.getChannelData(0);
            event.outputBuffer.getChannelData(0).fill(0);
            appendMicSamples(downsampleBuffer(input, context.sampleRate, micSampleRate));
          };
          source.connect(processor);
          processor.connect(context.destination);
          setStatus("面试进行中 · 麦克风采集中", "live");
          fallbackInput.hidden = true;
        } catch (error) {
          enableFallbackInput(micErrorMessage(error));
        }
      }

      function micErrorMessage(error) {
        const name = error && error.name ? error.name : "";
        if (name === "NotAllowedError" || name === "SecurityError") {
          return "麦克风权限被拒绝，请在浏览器和系统设置中允许后刷新页面；也可手动输入回答。";
        }
        if (name === "NotFoundError" || name === "DevicesNotFoundError") {
          return "未找到麦克风，可手动输入回答。";
        }
        return `麦克风启动失败：${errorText(error)}，可手动输入回答。`;
      }

      function enableFallbackInput(message) {
        fallbackInput.hidden = false;
        setStatus("面试进行中 · 麦克风不可用", "warn");
        appendEvent("麦克风", escapeHtml(message), "red");
      }

      function stopMicCapture() {
        const mic = state.mic;
        state.mic = null;
        state.micSamples = [];
        if (!mic) return;
        if (mic.processor) {
          mic.processor.disconnect();
          mic.processor.onaudioprocess = null;
        }
        if (mic.source) mic.source.disconnect();
        if (mic.stream) mic.stream.getTracks().forEach((track) => track.stop());
        if (mic.context && mic.context.state !== "closed") {
          mic.context.close().catch(() => {});
        }
      }

      function downsampleBuffer(buffer, inputRate, outputRate) {
        if (inputRate === outputRate) return buffer;
        const ratio = inputRate / outputRate;
        const length = Math.floor(buffer.length / ratio);
        const result = new Float32Array(length);
        for (let index = 0; index < length; index += 1) {
          const sourceIndex = index * ratio;
          const before = Math.floor(sourceIndex);
          const after = Math.min(before + 1, buffer.length - 1);
          const weight = sourceIndex - before;
          result[index] = buffer[before] * (1 - weight) + buffer[after] * weight;
        }
        return result;
      }

      function samplesToBase64Pcm16(samples) {
        const buffer = new ArrayBuffer(samples.length * 2);
        const view = new DataView(buffer);
        for (let index = 0; index < samples.length; index += 1) {
          const sample = Math.max(-1, Math.min(1, samples[index]));
          view.setInt16(index * 2, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
        }
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let offset = 0; offset < bytes.length; offset += 0x8000) {
          binary += String.fromCharCode(...bytes.subarray(offset, offset + 0x8000));
        }
        return btoa(binary);
      }

      function appendMicSamples(samples) {
        for (let index = 0; index < samples.length; index += 1) {
          state.micSamples.push(samples[index]);
        }
        while (state.micSamples.length >= micChunkSamples) {
          sendMicSamples(state.micSamples.splice(0, micChunkSamples));
        }
      }

      function sendMicSamples(samples) {
        if (!socketReady() || samples.length === 0) return;
        const startMs = Math.round((state.micSentSamples / micSampleRate) * 1000);
        const endMs = Math.round(((state.micSentSamples + samples.length) / micSampleRate) * 1000);
        const sent = sendPayload({
          type: "audio_chunk",
          session_id: state.interview.id,
          seq: state.seq,
          audio: samplesToBase64Pcm16(samples),
          speaker: "candidate",
          format: "pcm16",
          sample_rate_hz: micSampleRate,
          channels: 1,
          start_ms: startMs,
          end_ms: endMs,
          is_final: true,
          confidence: 0.95,
          ...questionMeta(),
        });
        if (!sent) return;
        state.seq += 1;
        state.micSentSamples += samples.length;
      }

      // ----- 文本兜底 -----

      function sendFallbackText() {
        const answer = fallbackText.value.trim();
        if (!answer || !socketReady()) return;
        const elapsed = Math.max(0, Date.now() - state.startedAt);
        sendPayload({
          type: "text_turn",
          seq: state.seq,
          speaker: "candidate",
          answer,
          confidence: 1,
          start_ms: elapsed,
          end_ms: elapsed + Math.max(1200, answer.length * 200),
          ...questionMeta(),
        });
        state.seq += 1;
        fallbackText.value = "";
      }

      // ----- 报告 -----

      function clearReportPolling() {
        if (state.reportPollTimer) {
          window.clearTimeout(state.reportPollTimer);
          state.reportPollTimer = null;
        }
        state.reportPollAttempts = 0;
      }

      function scheduleReportPolling(interviewId) {
        if (state.reportPollTimer || state.phase !== "queued") return;
        if (state.reportPollAttempts >= reportPollMaxAttempts) {
          setStatus("后台评分超时，请稍后刷新页面查看。", "warn");
          return;
        }
        state.reportPollAttempts += 1;
        state.reportPollTimer = window.setTimeout(async () => {
          state.reportPollTimer = null;
          try {
            const report = await fetchGatewayJson(`/api/interviews/${interviewId}/report`);
            state.phase = "report";
            renderReport(report);
            showPhase("report");
            setStatus("报告已生成", "ready");
          } catch (error) {
            scheduleReportPolling(interviewId);
          }
        }, reportPollIntervalMs);
      }

      function recommendationLabel(value) {
        return (
          {
            strong_yes: "强烈推荐",
            yes: "推荐",
            hold: "待定",
            no: "不推荐",
          }[value] || value
        );
      }

      function renderReport(report) {
        clearReportPolling();
        const score = report.score || {};
        const interviewId = String(report.interview_id || (state.interview && state.interview.id) || "");
        const dimensions = Array.isArray(score.dimensions) ? score.dimensions : [];
        const riskNotes = Array.isArray(score.risk_notes) ? score.risk_notes : [];
        const transcript = Array.isArray(report.transcript) ? report.transcript : [];
        const rows = dimensions
          .map(
            (dimension) => `
              <tr>
                <td>${escapeHtml(dimension.dimension)}</td>
                <td>${escapeHtml(dimension.score)}</td>
              </tr>
            `
          )
          .join("");
        const risks = riskNotes.length
          ? riskNotes.map((note) => `<p class="risk">${escapeHtml(note)}</p>`).join("")
          : '<p class="success">暂无高置信风险点。</p>';
        const turns = transcript
          .map(
            (turn, index) => `
              <tr>
                <td>${index + 1}</td>
                <td>${escapeHtml(turn.question)}</td>
                <td>${escapeHtml(turn.answer)}</td>
              </tr>
            `
          )
          .join("");
        reportPanel.innerHTML = `
          <div style="display: grid; gap: 12px;">
            ${
              (report.analysis_mode || score.analysis_mode) === "fallback"
                ? '<p class="risk">本报告由规则兜底生成（未启用大模型），仅供链路验证。</p>'
                : ""
            }
            <div class="score-line">
              <div class="score-main"><strong>${escapeHtml(score.total_score ?? "—")}</strong><span>${escapeHtml(recommendationLabel(score.recommendation || "待定"))}</span></div>
              <p class="small">${escapeHtml(report.summary || "暂无总评。")}</p>
            </div>
            <div>${risks}</div>
            <table>
              <thead><tr><th>维度</th><th>分数</th></tr></thead>
              <tbody>${rows || '<tr><td colspan="2">暂无维度评分。</td></tr>'}</tbody>
            </table>
            <table>
              <thead><tr><th>#</th><th>问题</th><th>回答</th></tr></thead>
              <tbody>${turns || '<tr><td colspan="3">暂无转写记录。</td></tr>'}</tbody>
            </table>
          </div>
        `;
        const query = state.apiKey ? `?api_key=${encodeURIComponent(state.apiKey)}` : "";
        reportLinks.innerHTML = ["html", "pdf", "json", "transcript.json"]
          .map(
            (format) =>
              `<a href="${escapeHtml(apiUrl(`/api/interviews/${interviewId}/report.${format}${query}`))}" target="_blank" rel="noreferrer">${escapeHtml({ html: "HTML 报告", pdf: "PDF", json: "JSON", "transcript.json": "完整转写" }[format])}</a>`
          )
          .join("");
      }

      // ----- 事件绑定 -----

      startInterview.addEventListener("click", beginInterview);
      endInterview.addEventListener("click", requestEnd);
      newInterview.addEventListener("click", resetAll);
      fallbackSend.addEventListener("click", sendFallbackText);
      fallbackText.addEventListener("keydown", (event) => {
        if (event.key === "Enter") sendFallbackText();
      });
      document.querySelector("#jdFile").addEventListener("change", (event) => {
        parseDocumentFile(
          event.target.files[0],
          event.target,
          jdText,
          document.querySelector("#jdFileStatus"),
          "jd"
        );
      });
      document.querySelector("#resumeFile").addEventListener("change", (event) => {
        parseDocumentFile(
          event.target.files[0],
          event.target,
          resumeText,
          document.querySelector("#resumeFileStatus"),
          "resume"
        );
      });

      discoverGateway()
        .then(() => setStatus("准备就绪", "ready"))
        .catch((error) => setStatus(errorText(error), "warn"));
      syncControls();
    </script>
  </body>
</html>
