<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>水货杀手</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #18202f;
        --muted: #667085;
        --line: #d7dce5;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --risk: #b42318;
        --ok: #157f3b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei",
          sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 64px;
        padding: 12px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0;
      }

      main {
        display: grid;
        grid-template-columns: minmax(360px, 0.9fr) minmax(420px, 1.1fr);
        gap: 16px;
        padding: 16px;
      }

      section {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0;
        font-size: 15px;
        letter-spacing: 0;
      }

      form,
      .results {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        color: var(--text);
        background: #fff;
        font: inherit;
        font-size: 14px;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
        line-height: 1.5;
      }

      .turn {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .toolbar .status {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        font-size: 13px;
      }

      .full-width {
        grid-column: 1 / -1;
      }

      .live-grid {
        display: grid;
        grid-template-columns: minmax(320px, 0.8fr) minmax(420px, 1.2fr);
        gap: 16px;
        padding: 16px;
      }

      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 8px 12px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-size: 14px;
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary,
      a.secondary {
        background: #fff;
        color: var(--accent-strong);
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      .score {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 12px;
      }

      .score-main {
        display: grid;
        place-items: center;
        min-height: 160px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fbfa;
      }

      .score-main strong {
        font-size: 44px;
        line-height: 1;
        letter-spacing: 0;
      }

      .summary {
        display: grid;
        align-content: center;
        gap: 8px;
        min-height: 160px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .muted {
        color: var(--muted);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-weight: 600;
      }

      .risk {
        color: var(--risk);
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 360px;
        color: var(--muted);
        text-align: center;
      }

      .feed {
        display: grid;
        align-content: start;
        gap: 10px;
        min-height: 360px;
        max-height: 560px;
        overflow: auto;
      }

      .event {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: #fbfcfe;
      }

      .event strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      @media (max-width: 900px) {
        main,
        .score,
        .live-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>水货杀手</h1>
      <span class="muted">AI 实时深挖面试官助手</span>
    </header>
    <main>
      <section>
        <div class="panel-head">
          <h2>离线评估</h2>
          <button class="secondary" type="button" id="addTurn">添加问答</button>
        </div>
        <form id="evaluateForm">
          <label>
            岗位名称
            <input name="job_title" value="AI 后端工程师" required />
          </label>
          <label>
            JD 文本
            <textarea name="jd_text" required>负责 Python/FastAPI 微服务、LLM 应用、评估体系和可靠性工程。</textarea>
          </label>
          <label>
            候选人
            <input name="candidate_name" value="候选人A" required />
          </label>
          <label>
            简历摘要
            <textarea name="resume_text">做过 AI 应用和后端服务。</textarea>
          </label>
          <div id="turns"></div>
          <div class="toolbar">
            <button id="submit" type="submit">生成报告</button>
            <button class="secondary" type="button" id="loadSample">填入样例</button>
          </div>
        </form>
      </section>
      <section>
        <div class="panel-head">
          <h2>评估报告</h2>
          <div class="toolbar" id="links"></div>
        </div>
        <div class="results" id="results">
          <div class="empty">提交一段问答后，这里会显示评分、风险点和报告链接。</div>
        </div>
      </section>
      <section class="full-width">
        <div class="panel-head">
          <h2>实时追问</h2>
          <span class="muted" id="liveStatus">未连接</span>
        </div>
        <div class="live-grid">
          <form id="liveForm">
            <label>
              岗位名称
              <input name="live_job_title" value="AI 后端工程师" required />
            </label>
            <label>
              JD 文本
              <textarea name="live_jd_text" required>Python FastAPI LLM 可靠性 项目决策 指标复盘</textarea>
            </label>
            <label>
              候选人
              <input name="live_candidate_name" value="候选人B" required />
            </label>
            <label>
              候选人回答
              <textarea name="live_answer" required>我主要负责优化项目架构，做了很多可靠性提升，最终效果比较明显。</textarea>
            </label>
            <div class="toolbar">
              <button type="submit" id="liveConnect">开始</button>
              <button class="secondary" type="button" id="sendTurn" disabled>发送回答</button>
              <button class="secondary" type="button" id="startMic" disabled>开始麦克风</button>
              <button class="secondary" type="button" id="stopMic" disabled>停止麦克风</button>
              <button class="secondary" type="button" id="manualProbe" disabled>手动追问</button>
              <button class="secondary" type="button" id="endLive" disabled>结束</button>
              <span class="muted status" id="micStatus">麦克风未开启</span>
            </div>
          </form>
          <div class="feed" id="liveFeed">
            <div class="empty">开始后，转写、追问卡、可信度和报告会显示在这里。</div>
          </div>
        </div>
      </section>
    </main>
    <script>
      const turns = document.querySelector("#turns");
      const results = document.querySelector("#results");
      const links = document.querySelector("#links");
      const submit = document.querySelector("#submit");
      const liveForm = document.querySelector("#liveForm");
      const liveFeed = document.querySelector("#liveFeed");
      const liveStatus = document.querySelector("#liveStatus");
      const liveConnectButton = document.querySelector("#liveConnect");
      const sendTurnButton = document.querySelector("#sendTurn");
      const startMicButton = document.querySelector("#startMic");
      const stopMicButton = document.querySelector("#stopMic");
      const manualProbeButton = document.querySelector("#manualProbe");
      const endLiveButton = document.querySelector("#endLive");
      const micStatus = document.querySelector("#micStatus");
      let liveSocket = null;
      let liveInterviewId = "";
      let liveSeq = 1;
      let micStream = null;
      let micContext = null;
      let micSource = null;
      let micProcessor = null;
      let micSamples = [];
      let micSentSamples = 0;
      let micRecording = false;
      const micSampleRate = 16000;
      const micChunkSamples = micSampleRate;

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function addTurn(question = "", answer = "") {
        const index = turns.children.length + 1;
        const node = document.createElement("div");
        node.className = "turn";
        node.innerHTML = `
          <label>问题 ${index}<textarea name="question" required>${question}</textarea></label>
          <label>回答 ${index}<textarea name="answer" required>${answer}</textarea></label>
        `;
        turns.appendChild(node);
      }

      function loadSample() {
        turns.innerHTML = "";
        addTurn("介绍一个你最核心的 AI 项目。", "我主要负责整体架构设计并推动项目落地，优化后效果有显著提升。");
        addTurn("具体你写了哪部分？", "我写了 FastAPI 的调用编排、重试和 JSON 解析，因为线上模型偶发返回格式错误。");
      }

      function formPayload(form) {
        const turnNodes = [...turns.querySelectorAll(".turn")];
        return {
          job_title: form.job_title.value,
          jd_text: form.jd_text.value,
          candidate_name: form.candidate_name.value,
          resume_text: form.resume_text.value,
          turns: turnNodes.map((node, index) => ({
            question: node.querySelector('[name="question"]').value,
            answer: node.querySelector('[name="answer"]').value,
            answer_start_ms: index * 30000,
            answer_end_ms: index * 30000 + 20000,
          })),
        };
      }

      function renderReport(payload) {
        const report = payload.report;
        const score = report.score;
        links.innerHTML = `
          <a class="button secondary" href="/api/interviews/${report.interview_id}/report.html" target="_blank">HTML</a>
          <a class="button secondary" href="/api/interviews/${report.interview_id}/report.pdf" target="_blank">PDF</a>
        `;
        const dimensions = score.dimensions
          .map(
            (d) => `
              <tr>
                <td>${escapeHtml(d.dimension)}</td>
                <td>${escapeHtml(d.score)}</td>
                <td>${escapeHtml(d.weight)}</td>
                <td>${d.evidence.map((e) => escapeHtml(e.excerpt)).join("<br>")}</td>
              </tr>`
          )
          .join("");
        const risks =
          score.risk_notes.length > 0
            ? score.risk_notes.map((note) => `<p class="risk">${escapeHtml(note)}</p>`).join("")
            : '<p class="muted">暂无高置信风险点。</p>';
        results.innerHTML = `
          <div class="score">
            <div class="score-main"><strong>${escapeHtml(score.total_score)}</strong><span class="muted">${escapeHtml(score.recommendation)}</span></div>
            <div class="summary"><strong>总评</strong><span>${escapeHtml(report.summary)}</span></div>
          </div>
          <div>${risks}</div>
          <table>
            <thead><tr><th>维度</th><th>分数</th><th>权重</th><th>证据</th></tr></thead>
            <tbody>${dimensions}</tbody>
          </table>
        `;
      }

      function appendLiveEvent(title, body, tone = "") {
        if (liveFeed.querySelector(".empty")) liveFeed.innerHTML = "";
        const node = document.createElement("div");
        node.className = `event ${tone}`;
        node.innerHTML = `<strong>${escapeHtml(title)}</strong><div>${body}</div>`;
        liveFeed.prepend(node);
      }

      async function createLiveInterview(form) {
        const job = await postJson("/api/jobs", {
          title: form.live_job_title.value,
          jd_text: form.live_jd_text.value,
        });
        const candidate = await postJson("/api/candidates", {
          name: form.live_candidate_name.value,
          resume_text: "",
        });
        return postJson("/api/interviews", {
          job_id: job.id,
          candidate_id: candidate.id,
        });
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      function setLiveConnected(connected) {
        liveStatus.textContent = connected ? `已连接 ${liveInterviewId}` : "未连接";
        liveConnectButton.disabled = connected;
        sendTurnButton.disabled = !connected;
        startMicButton.disabled = !connected || micRecording;
        stopMicButton.disabled = !connected || !micRecording;
        manualProbeButton.disabled = !connected;
        endLiveButton.disabled = !connected;
      }

      function openLiveSocket(interviewId) {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        liveSocket = new WebSocket(`${protocol}://${window.location.host}/ws/interview/${interviewId}`);
        liveSocket.addEventListener("open", () => {
          setLiveConnected(true);
          appendLiveEvent("连接", "实时通道已打开。");
        });
        liveSocket.addEventListener("close", () => {
          stopMicCapture();
          setLiveConnected(false);
          appendLiveEvent("连接", "实时通道已关闭。");
        });
        liveSocket.addEventListener("message", (event) => renderLiveMessage(JSON.parse(event.data)));
      }

      function renderLiveMessage(message) {
        if (message.type === "transcript") {
          appendLiveEvent(
            "转写",
            `${escapeHtml(message.payload.speaker)} · ${escapeHtml(message.payload.text)}`
          );
        } else if (message.type === "probe") {
          const cards = message.payload.suggestions
            .map((item) => `<p>${escapeHtml(item.priority)}. ${escapeHtml(item.question)}<br><span class="muted">${escapeHtml(item.target)} · ${escapeHtml(item.competency)}</span></p>`)
            .join("");
          appendLiveEvent("追问卡", cards);
        } else if (message.type === "credibility") {
          appendLiveEvent(
            "可信度",
            `${escapeHtml(message.payload.level)} · ${escapeHtml(message.payload.reason)}<br><span class="muted">${escapeHtml(message.payload.drill_down_hint)}</span>`
          );
        } else if (message.type === "signal") {
          appendLiveEvent(
            "行为信号",
            `fluency ${escapeHtml(message.payload.fluency)} · hesitation ${escapeHtml(message.payload.hesitation)}`
          );
        } else if (message.type === "asr_warning") {
          appendLiveEvent("ASR", escapeHtml(message.payload.reason), "risk");
        } else if (message.type === "report") {
          stopMicCapture();
          const id = message.payload.interview_id;
          appendLiveEvent(
            "报告",
            `<a class="button secondary" href="/api/interviews/${id}/report.html" target="_blank">HTML</a> <a class="button secondary" href="/api/interviews/${id}/report.pdf" target="_blank">PDF</a>`
          );
        } else if (message.type === "task_queued") {
          appendLiveEvent(
            "任务已排队",
            `${escapeHtml(message.payload.task_name)} · ${escapeHtml(message.payload.task_id)}`
          );
        } else if (message.type === "error") {
          appendLiveEvent("错误", escapeHtml(message.detail || "unknown error"), "risk");
        }
      }

      function sendLiveTurn(manual = false) {
        if (!liveSocket || liveSocket.readyState !== WebSocket.OPEN) return;
        const answer = liveForm.live_answer.value;
        liveSocket.send(
          JSON.stringify(
            manual
              ? { type: "manual_probe", answer }
              : { type: "text_turn", seq: liveSeq++, answer, speaker: "candidate" }
          )
        );
      }

      function downsampleBuffer(buffer, inputRate, outputRate) {
        if (inputRate === outputRate) return buffer;
        const ratio = inputRate / outputRate;
        const length = Math.floor(buffer.length / ratio);
        const result = new Float32Array(length);
        for (let index = 0; index < length; index += 1) {
          const sourceIndex = index * ratio;
          const before = Math.floor(sourceIndex);
          const after = Math.min(before + 1, buffer.length - 1);
          const weight = sourceIndex - before;
          result[index] = buffer[before] * (1 - weight) + buffer[after] * weight;
        }
        return result;
      }

      function samplesToBase64Pcm16(samples) {
        const buffer = new ArrayBuffer(samples.length * 2);
        const view = new DataView(buffer);
        for (let index = 0; index < samples.length; index += 1) {
          const sample = Math.max(-1, Math.min(1, samples[index]));
          view.setInt16(index * 2, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
        }
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let offset = 0; offset < bytes.length; offset += 0x8000) {
          const chunk = bytes.subarray(offset, offset + 0x8000);
          binary += String.fromCharCode(...chunk);
        }
        return btoa(binary);
      }

      function appendMicSamples(samples) {
        for (let index = 0; index < samples.length; index += 1) {
          micSamples.push(samples[index]);
        }
        while (micSamples.length >= micChunkSamples) {
          sendMicSamples(micSamples.splice(0, micChunkSamples));
        }
      }

      function sendMicSamples(samples) {
        if (!liveSocket || liveSocket.readyState !== WebSocket.OPEN || samples.length === 0) return;
        const startMs = Math.round((micSentSamples / micSampleRate) * 1000);
        micSentSamples += samples.length;
        const endMs = Math.round((micSentSamples / micSampleRate) * 1000);
        liveSocket.send(
          JSON.stringify({
            type: "audio_chunk",
            session_id: liveInterviewId,
            seq: liveSeq++,
            audio: samplesToBase64Pcm16(samples),
            speaker: "candidate",
            format: "pcm16",
            sample_rate_hz: micSampleRate,
            channels: 1,
            start_ms: startMs,
            end_ms: endMs,
            is_final: true,
            confidence: 0.95,
          })
        );
      }

      async function startMicCapture() {
        if (micRecording || !liveSocket || liveSocket.readyState !== WebSocket.OPEN) return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          appendLiveEvent("麦克风", "当前浏览器不支持麦克风采集。", "risk");
          return;
        }
        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
          micContext = new AudioContext();
          micSource = micContext.createMediaStreamSource(micStream);
          micProcessor = micContext.createScriptProcessor(4096, 1, 1);
          micSamples = [];
          micSentSamples = 0;
          micRecording = true;
          micProcessor.onaudioprocess = (event) => {
            const input = event.inputBuffer.getChannelData(0);
            const output = event.outputBuffer.getChannelData(0);
            output.fill(0);
            appendMicSamples(downsampleBuffer(input, micContext.sampleRate, micSampleRate));
          };
          micSource.connect(micProcessor);
          micProcessor.connect(micContext.destination);
          micStatus.textContent = "麦克风采集中";
          appendLiveEvent(
            "麦克风",
            "已开始发送 16k PCM 音频。若仍使用本地 stub ASR，只能验证链路；真实转写需配置 ASR_PROVIDER=http。"
          );
          setLiveConnected(true);
        } catch (error) {
          micStatus.textContent = "麦克风未开启";
          appendLiveEvent("麦克风", escapeHtml(error), "risk");
          stopMicCapture();
        }
      }

      function stopMicCapture() {
        if (!micRecording && !micStream && !micContext) return;
        if (micSamples.length > 0) {
          sendMicSamples(micSamples.splice(0, micSamples.length));
        }
        micRecording = false;
        if (micProcessor) {
          micProcessor.disconnect();
          micProcessor.onaudioprocess = null;
        }
        if (micSource) micSource.disconnect();
        if (micStream) {
          micStream.getTracks().forEach((track) => track.stop());
        }
        if (micContext && micContext.state !== "closed") {
          micContext.close().catch(() => {});
        }
        micStream = null;
        micContext = null;
        micSource = null;
        micProcessor = null;
        micSamples = [];
        micStatus.textContent = "麦克风未开启";
        setLiveConnected(Boolean(liveSocket && liveSocket.readyState === WebSocket.OPEN));
      }

      document.querySelector("#addTurn").addEventListener("click", () => addTurn());
      document.querySelector("#loadSample").addEventListener("click", loadSample);
      liveForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        liveConnectButton.disabled = true;
        try {
          const interview = await createLiveInterview(event.currentTarget);
          liveInterviewId = interview.id;
          liveSeq = 1;
          liveFeed.innerHTML = "";
          openLiveSocket(liveInterviewId);
        } catch (error) {
          appendLiveEvent("错误", escapeHtml(error), "risk");
          liveConnectButton.disabled = false;
        }
      });
      sendTurnButton.addEventListener("click", () => sendLiveTurn(false));
      startMicButton.addEventListener("click", () => startMicCapture());
      stopMicButton.addEventListener("click", () => stopMicCapture());
      manualProbeButton.addEventListener("click", () => sendLiveTurn(true));
      endLiveButton.addEventListener("click", () => {
        stopMicCapture();
        if (liveSocket && liveSocket.readyState === WebSocket.OPEN) {
          liveSocket.send(JSON.stringify({ type: "end" }));
        }
      });
      document.querySelector("#evaluateForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        submit.disabled = true;
        submit.textContent = "生成中";
        try {
          const response = await fetch("/api/offline/evaluate", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(formPayload(event.currentTarget)),
          });
          if (!response.ok) throw new Error(await response.text());
          renderReport(await response.json());
        } catch (error) {
          results.innerHTML = `<div class="empty risk">${String(error)}</div>`;
        } finally {
          submit.disabled = false;
          submit.textContent = "生成报告";
        }
      });

      loadSample();
    </script>
  </body>
</html>
