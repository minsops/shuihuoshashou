name: shuihuo-killer

services:
  gateway:
    build: .
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      APP_ENV: docker
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
      DATABASE_URL: postgresql://shuihuo:shuihuo_local@postgres:5432/shuihuo_killer
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-shuihuo-killer-gateway}
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: shuihuo-killer
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_REGION: us-east-1
      REPORT_DIR: /app/data/reports
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-mimo-v2.5-pro}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      LLM_API_PATH: ${LLM_API_PATH:-/chat/completions}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_AUTH_HEADER: ${LLM_AUTH_HEADER:-api-key}
      LLM_AUTH_SCHEME: ${LLM_AUTH_SCHEME:-}
      LLM_RESPONSE_CONTENT_PATH: ${LLM_RESPONSE_CONTENT_PATH:-choices.0.message.content}
      LLM_EXTRA_BODY_JSON: ${LLM_EXTRA_BODY_JSON:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_RATE_LIMIT_ENABLED: ${LLM_RATE_LIMIT_ENABLED:-false}
      LLM_RATE_LIMIT_REQUESTS_PER_MINUTE: ${LLM_RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      ASR_PROVIDER: ${ASR_PROVIDER:-stub}
      ASR_BASE_URL: ${ASR_BASE_URL:-}
      ASR_API_PATH: ${ASR_API_PATH:-/transcribe}
      ASR_API_KEY: ${ASR_API_KEY:-}
      ASR_AUTH_HEADER: ${ASR_AUTH_HEADER:-Authorization}
      ASR_AUTH_SCHEME: ${ASR_AUTH_SCHEME:-Bearer}
      ASR_TEXT_PATH: ${ASR_TEXT_PATH:-text}
      ASR_SPEAKER_PATH: ${ASR_SPEAKER_PATH:-speaker}
      ASR_START_MS_PATH: ${ASR_START_MS_PATH:-start_ms}
      ASR_END_MS_PATH: ${ASR_END_MS_PATH:-end_ms}
      ASR_IS_FINAL_PATH: ${ASR_IS_FINAL_PATH:-is_final}
      ASR_CONFIDENCE_PATH: ${ASR_CONFIDENCE_PATH:-confidence}
      ASR_TIMEOUT_SECONDS: ${ASR_TIMEOUT_SECONDS:-30}
      ASR_INTERVIEWER_CHANNELS: ${ASR_INTERVIEWER_CHANNELS:-0,left,interviewer}
      ASR_CANDIDATE_CHANNELS: ${ASR_CANDIDATE_CHANNELS:-1,right,candidate}
      ALIYUN_ASR_API_KEY: ${ALIYUN_ASR_API_KEY:-}
      ALIYUN_ASR_MODEL: ${ALIYUN_ASR_MODEL:-paraformer-realtime-v2}
      ALIYUN_ASR_SAMPLE_RATE: ${ALIYUN_ASR_SAMPLE_RATE:-16000}
      ALIYUN_ASR_FORMAT: ${ALIYUN_ASR_FORMAT:-pcm}
      ALIYUN_ASR_LANGUAGE_HINTS: ${ALIYUN_ASR_LANGUAGE_HINTS:-zh,en}
      ALIYUN_ASR_ENDPOINT: ${ALIYUN_ASR_ENDPOINT:-wss://dashscope.aliyuncs.com/api-ws/v1/inference}
      ALIYUN_NLS_APP_KEY: ${ALIYUN_NLS_APP_KEY:-}
      ALIYUN_NLS_TOKEN: ${ALIYUN_NLS_TOKEN:-}
      ALIYUN_NLS_ENDPOINT: ${ALIYUN_NLS_ENDPOINT:-wss://nls-gateway-cn-shanghai.aliyuncs.com/ws/v1}
      ALIYUN_NLS_SAMPLE_RATE: ${ALIYUN_NLS_SAMPLE_RATE:-16000}
      ALIYUN_NLS_FORMAT: ${ALIYUN_NLS_FORMAT:-pcm}
      ALIYUN_AK_ID: ${ALIYUN_AK_ID:-}
      ALIYUN_AK_SECRET: ${ALIYUN_AK_SECRET:-}
      ALIYUN_NLS_TOKEN_ENDPOINT: ${ALIYUN_NLS_TOKEN_ENDPOINT:-https://nls-meta.cn-shanghai.aliyuncs.com/}
      ALIYUN_NLS_TOKEN_REGION: ${ALIYUN_NLS_TOKEN_REGION:-cn-shanghai}
      SPEAKER_MODE: ${SPEAKER_MODE:-manual}
      DIALOGUE_SILENCE_CLOSE_MS: ${DIALOGUE_SILENCE_CLOSE_MS:-2500}
      PROBE_MIN_ANSWER_CHARS: ${PROBE_MIN_ANSWER_CHARS:-20}
      PROBE_MIN_INTERVAL_MS: ${PROBE_MIN_INTERVAL_MS:-1000}
      PROBE_REQUIRE_TOPIC_MATCH: ${PROBE_REQUIRE_TOPIC_MATCH:-true}
      PROBE_TOPIC_KEYWORDS: ${PROBE_TOPIC_KEYWORDS:-项目,技术,架构,方案,决策,优化,性能,指标,数据,负责,实现,上线,故障,异常,成本,延迟,吞吐,FastAPI,LLM,Python}
      CHAIN_CRACK_PENALTY: ${CHAIN_CRACK_PENALTY:-8}
      CHAIN_HELD_UP_BONUS: ${CHAIN_HELD_UP_BONUS:-3}
      SPEAKER_DIARIZATION_PROVIDER: ${SPEAKER_DIARIZATION_PROVIDER:-local}
      SPEAKER_DIARIZATION_BASE_URL: ${SPEAKER_DIARIZATION_BASE_URL:-}
      SPEAKER_DIARIZATION_API_PATH: ${SPEAKER_DIARIZATION_API_PATH:-/diarize}
      SPEAKER_DIARIZATION_API_KEY: ${SPEAKER_DIARIZATION_API_KEY:-}
      SPEAKER_DIARIZATION_AUTH_HEADER: ${SPEAKER_DIARIZATION_AUTH_HEADER:-Authorization}
      SPEAKER_DIARIZATION_AUTH_SCHEME: ${SPEAKER_DIARIZATION_AUTH_SCHEME:-Bearer}
      SPEAKER_DIARIZATION_SPEAKER_PATH: ${SPEAKER_DIARIZATION_SPEAKER_PATH:-speaker}
      SPEAKER_DIARIZATION_TIMEOUT_SECONDS: ${SPEAKER_DIARIZATION_TIMEOUT_SECONDS:-10}
      AIGC_DETECTOR_PROVIDER: ${AIGC_DETECTOR_PROVIDER:-local}
      AIGC_DETECTOR_BASE_URL: ${AIGC_DETECTOR_BASE_URL:-}
      AIGC_DETECTOR_API_PATH: ${AIGC_DETECTOR_API_PATH:-/detect}
      AIGC_DETECTOR_API_KEY: ${AIGC_DETECTOR_API_KEY:-}
      AIGC_DETECTOR_AUTH_HEADER: ${AIGC_DETECTOR_AUTH_HEADER:-Authorization}
      AIGC_DETECTOR_AUTH_SCHEME: ${AIGC_DETECTOR_AUTH_SCHEME:-Bearer}
      AIGC_DETECTOR_PROBABILITY_PATH: ${AIGC_DETECTOR_PROBABILITY_PATH:-ai_generated_prob}
      AIGC_DETECTOR_FLAGGED_PATH: ${AIGC_DETECTOR_FLAGGED_PATH:-flagged}
      AIGC_DETECTOR_TIMEOUT_SECONDS: ${AIGC_DETECTOR_TIMEOUT_SECONDS:-10}
      AIGC_AI_PROB_THRESHOLD: ${AIGC_AI_PROB_THRESHOLD:-0.65}
      AIGC_TEMPLATE_SIMILARITY_THRESHOLD: ${AIGC_TEMPLATE_SIMILARITY_THRESHOLD:-0.45}
      REHEARSAL_THRESHOLD: ${REHEARSAL_THRESHOLD:-0.55}
      SIGNAL_ENABLED: ${SIGNAL_ENABLED:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-local}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      REDIS_RATE_LIMIT_PREFIX: ${REDIS_RATE_LIMIT_PREFIX:-shuihuo:rate_limit}
      OFFLINE_TASK_BACKEND: ${OFFLINE_TASK_BACKEND:-local}
      OFFLINE_TASK_EXECUTION: ${OFFLINE_TASK_EXECUTION:-sync}
      CELERY_TASK_QUEUE: ${CELERY_TASK_QUEUE:-shuihuo-offline}
      REDIS_STREAM_PREFIX: ${REDIS_STREAM_PREFIX:-shuihuo}
      JD_VECTOR_BACKEND: ${JD_VECTOR_BACKEND:-local}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 6

  offline-worker:
    build: .
    profiles: ["worker"]
    command: ["celery", "-A", "services.offline_worker.celery_tasks:celery_app", "worker", "--loglevel=info"]
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql://shuihuo:shuihuo_local@postgres:5432/shuihuo_killer
      REDIS_URL: redis://redis:6379/0
      OFFLINE_TASK_BACKEND: celery
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CELERY_TASK_QUEUE: ${CELERY_TASK_QUEUE:-shuihuo-offline}
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: shuihuo-killer
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_REGION: us-east-1
      REPORT_DIR: /app/data/reports
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-mimo-v2.5-pro}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      LLM_API_PATH: ${LLM_API_PATH:-/chat/completions}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_AUTH_HEADER: ${LLM_AUTH_HEADER:-api-key}
      LLM_AUTH_SCHEME: ${LLM_AUTH_SCHEME:-}
      LLM_RESPONSE_CONTENT_PATH: ${LLM_RESPONSE_CONTENT_PATH:-choices.0.message.content}
      LLM_EXTRA_BODY_JSON: ${LLM_EXTRA_BODY_JSON:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_RATE_LIMIT_ENABLED: ${LLM_RATE_LIMIT_ENABLED:-false}
      LLM_RATE_LIMIT_REQUESTS_PER_MINUTE: ${LLM_RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      AIGC_DETECTOR_PROVIDER: ${AIGC_DETECTOR_PROVIDER:-local}
      AIGC_DETECTOR_BASE_URL: ${AIGC_DETECTOR_BASE_URL:-}
      AIGC_DETECTOR_API_PATH: ${AIGC_DETECTOR_API_PATH:-/detect}
      AIGC_DETECTOR_API_KEY: ${AIGC_DETECTOR_API_KEY:-}
      AIGC_DETECTOR_AUTH_HEADER: ${AIGC_DETECTOR_AUTH_HEADER:-Authorization}
      AIGC_DETECTOR_AUTH_SCHEME: ${AIGC_DETECTOR_AUTH_SCHEME:-Bearer}
      AIGC_DETECTOR_PROBABILITY_PATH: ${AIGC_DETECTOR_PROBABILITY_PATH:-ai_generated_prob}
      AIGC_DETECTOR_FLAGGED_PATH: ${AIGC_DETECTOR_FLAGGED_PATH:-flagged}
      AIGC_DETECTOR_TIMEOUT_SECONDS: ${AIGC_DETECTOR_TIMEOUT_SECONDS:-10}
      AIGC_AI_PROB_THRESHOLD: ${AIGC_AI_PROB_THRESHOLD:-0.65}
      AIGC_TEMPLATE_SIMILARITY_THRESHOLD: ${AIGC_TEMPLATE_SIMILARITY_THRESHOLD:-0.45}
      REHEARSAL_THRESHOLD: ${REHEARSAL_THRESHOLD:-0.55}
      CHAIN_CRACK_PENALTY: ${CHAIN_CRACK_PENALTY:-8}
      CHAIN_HELD_UP_BONUS: ${CHAIN_HELD_UP_BONUS:-3}
      REDIS_STREAM_PREFIX: ${REDIS_STREAM_PREFIX:-shuihuo}
      JD_VECTOR_BACKEND: ${JD_VECTOR_BACKEND:-local}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shuihuo_killer
      POSTGRES_USER: shuihuo
      POSTGRES_PASSWORD: shuihuo_local
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/postgres/001_core_schema.sql:/docker-entrypoint-initdb.d/001_core_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shuihuo -d shuihuo_killer"]
      interval: 10s
      timeout: 3s
      retries: 6

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

volumes:
  app-data:
  postgres-data:
  minio-data:
